# priority-classes.yaml
# =============================================================================
# PriorityClass definitions for the SRE Demo Platform
# =============================================================================
#
# WHY THIS MATTERS:
# On a single-node Docker Desktop cluster, when the node approaches memory or
# CPU limits (which WILL happen at 1000 VU), the Kubernetes scheduler must
# decide which pods to evict. Without PriorityClasses, eviction order is
# arbitrary — you can lose Grafana or cartservice with equal probability.
#
# With priorities defined:
#   system-node-critical (2000000000) — Alloy already uses this (built-in)
#   boutique-high        (1000)       — Cart, frontend, checkout — must stay up
#   observability-high   (900)        — Grafana, Prometheus — must stay for demo
#   boutique-standard    (500)        — Email, payment, shipping — can recover
#   boutique-background  (100)        — AdService — nice to have, can shed
#
# EVICTION ORDER (lowest priority evicted first):
#   adservice → emailservice/paymentservice/shippingservice → (observability) → cartservice/frontend
#
# This means the demo stays OBSERVABLE and FUNCTIONAL under pressure.
# The audience can always see Grafana + the critical shopping path working,
# even if ad recommendations temporarily drop.
#
# Apply this BEFORE any other manifests:
#   kubectl apply -f namespaces/priority-classes.yaml
# =============================================================================

apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: boutique-high
value: 1000
globalDefault: false
description: "Critical boutique services: cartservice, frontend, checkoutservice"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: observability-high
value: 900
globalDefault: false
description: "Core observability: Grafana, Prometheus, Tempo, Loki, Alloy"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: boutique-standard
value: 500
globalDefault: true   # default for anything without an explicit class
description: "Standard boutique services: email, payment, shipping, recommendation, currency"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: boutique-background
value: 100
globalDefault: false
description: "Background boutique services: adservice, load generators"
