# values.yaml — SRE Demo Platform
# =============================================================================
# Single source of truth for all tunable parameters.
# Override with:  helm upgrade --set boutique.frontend.replicas=4
# Full override:  helm upgrade -f my-overrides.yaml
#
# Resource strategy:
#   M5 Pro 64GB Docker Desktop allocates ~12 CPU / 48GB to k8s by default.
#   Boutique request budget:  ~3.5 CPU / ~5.5Gi
#   Observability budget:     ~2.5 CPU / ~6.5Gi
#   HPA headroom:             remaining CPU for scale-out
# =============================================================================

# ── Cluster target ─────────────────────────────────────────────────────────────
# "docker-desktop" or "kind" — affects NodePort availability and storage class
cluster:
  type: docker-desktop   # set to "kind" when using kind-cluster.yaml
  storageClass: local-path

# ── Namespaces ─────────────────────────────────────────────────────────────────
namespaces:
  observability: observability
  boutique: boutique

# ── Global image settings ──────────────────────────────────────────────────────
global:
  boutique:
    imageTag: v0.10.1
    registry: gcr.io/google-samples/microservices-demo

# ── Alloy (OTLP collector + log shipper) ──────────────────────────────────────
alloy:
  image: grafana/alloy:v1.5.1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  # Spanmetrics tuning
  metricsExpiration: 2h
  remoteWrite:
    capacity: 100000
    maxSamplesPerSend: 10000
    maxShards: 20
    minShards: 4

# ── Prometheus ─────────────────────────────────────────────────────────────────
prometheus:
  image: prom/prometheus:v2.52.0
  retention: 7d
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 3Gi
  nodePort: 30900

# ── Loki ──────────────────────────────────────────────────────────────────────
loki:
  image: grafana/loki:3.0.0
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  ingestionRateMb: 64
  ingestionBurstSizeMb: 128

# ── Tempo ──────────────────────────────────────────────────────────────────────
tempo:
  image: grafana/tempo:2.4.1
  blockRetention: 72h
  pvc:
    size: 10Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# ── Grafana ────────────────────────────────────────────────────────────────────
grafana:
  image: grafana/grafana:11.1.0
  adminPassword: admin
  pvc:
    size: 2Gi
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  nodePort: 30300

# ── Boutique services ──────────────────────────────────────────────────────────
boutique:

  frontend:
    replicas: 2
    resources:
      requests:
        cpu: 500m
        memory: 256Mi
      limits:
        cpu: 2000m
        memory: 512Mi
    hpa:
      minReplicas: 2
      maxReplicas: 12
      targetCPUUtilization: 50

  cartservice:
    replicas: 2
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1500m
        memory: 1Gi
    hpa:
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilization: 60

  productcatalogservice:
    replicas: 1
    resources:
      requests:
        cpu: 250m
        memory: 128Mi
      limits:
        cpu: 1500m
        memory: 256Mi
    hpa:
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilization: 50

  recommendationservice:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 800m
        memory: 512Mi
    hpa:
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilization: 55

  checkoutservice:
    replicas: 2
    resources:
      requests:
        cpu: 200m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 256Mi
    hpa:
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilization: 55

  currencyservice:
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    hpa:
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilization: 60

  adservice:
    replicas: 1
    jvmOpts: "-Xmx512m -Xms200m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:G1HeapRegionSize=4m"
    resources:
      requests:
        cpu: 200m
        memory: 350Mi
      limits:
        cpu: 800m
        memory: 768Mi

  emailservice:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 128Mi

  shippingservice:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  paymentservice:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  redis:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi
    maxMemory: 600mb
