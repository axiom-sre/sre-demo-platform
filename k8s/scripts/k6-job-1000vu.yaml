# k6-job-1000vu.yaml — Run k6 INSIDE the cluster
# =============================================================================
# WHY THIS EXISTS — The Docker Desktop NAT Throttle Problem:
#
# When k6 runs on your Mac and hits localhost:8080, traffic flows:
#   k6 → Mac loopback → Docker Desktop vpnkit NAT → kube-proxy → frontend pod
#
# vpnkit is a single-threaded userspace NAT proxy. It saturates at ~60-70 req/s
# regardless of how many VUs you throw at it. This is WHY every test from 100
# to 1000 VU shows the same ~55-73 req/s throughput. The app is fine. vpnkit is
# the bottleneck.
#
# Running k6 as a Kubernetes Job bypasses vpnkit entirely:
#   k6 pod → kube-proxy (iptables) → frontend pod
#   (in-cluster DNS: frontend.boutique.svc.cluster.local:8080)
#
# VALIDATED RESULT (2026-04-23):
#   throughput: 438 req/s avg, 6.47K req/s peak
#   p95: 838ms  p99: 1.74s  errors: 0.10%  availability: 99.982%
#   HPA: currency → 11 pods, frontend → 9 pods
#
# USAGE (full workflow):
#   # Pre-flight
#   kubectl get priorityclass boutique-background          # must exist
#   kubectl top nodes                                      # metrics-server must be ready
#   kubectl get hpa -n boutique                            # HPA must show TARGETS not <unknown>
#
#   # Deploy
#   kubectl delete job k6-1000vu -n boutique --ignore-not-found
#   kubectl delete configmap k6-script-1000vu -n boutique --ignore-not-found
#   kubectl apply -f k6-job-1000vu.yaml
#
#   # Monitor (3 terminals)
#   kubectl logs -f job/k6-1000vu -n boutique
#   watch -n 5 'kubectl get hpa -n boutique'
#   watch -n 5 'kubectl top pods -n boutique --sort-by=cpu'
#
#   # Job auto-deletes 10min after completion (ttlSecondsAfterFinished: 600)
# =============================================================================

# ── PriorityClass (idempotent — safe to apply even if it already exists) ─────
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: boutique-background
value: -10
globalDefault: false
preemptionPolicy: Never
description: "Low-priority class for background load-testing jobs"
---
# ── ConfigMap: k6 test script ─────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script-1000vu
  namespace: boutique
data:
  load-test.js: |
    import http from 'k6/http';
    import { sleep, check, group } from 'k6';

    // IN-CLUSTER: use service DNS, not localhost
    // This bypasses Docker Desktop's NAT proxy entirely
    const BASE = __ENV.BASE_URL || 'http://frontend.boutique.svc.cluster.local:8080';

    const P = {
      timeout: '30s',
      tags: { test: '1000vu-incluster' },
    };

    const PRODUCTS = [
      'OLJCESPC7Z', '66VCHSJNUP', '1YMWWN1N4O', '0PUK6V6EV0', '2ZYFJ3GM2N',
      'L9ECAV7KIM', 'LS4PSXUNUM', '9SIQT8TOJO', '6E92ZMYYFZ',
    ];

    export const options = {
      stages: [
        { duration: '2m',  target: 10   },  // warmup — prevents cold-start error spike
        { duration: '2m',  target: 100  },  // HPA wave 1
        { duration: '2m',  target: 300  },  // HPA wave 2
        { duration: '2m',  target: 600  },  // mid plateau
        { duration: '2m',  target: 1000 },  // peak ramp
        { duration: '10m',  target: 1000 },  // sustained peak — the money shot
        { duration: '5m',  target: 0    },  // ramp down — watch HPA stabilization
      ],
      thresholds: {
        http_req_failed:   ['rate<0.01'],
        http_req_duration: ['p(95)<2000'],
        'http_req_duration{expected_response:true}': ['p(99)<8000'],
      },
      summaryTrendStats: ['avg', 'min', 'med', 'max', 'p(90)', 'p(95)', 'p(99)'],
    };

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function think(lo, hi) { sleep(Math.random() * (hi - lo) + lo); }

    export default function () {
      const persona = Math.random();
      group('session', () => {
        const home = http.get(`${BASE}/`, { ...P, tags: { ...P.tags, name: 'Home' } });
        check(home, { 'home: 200': r => r.status === 200 });
        think(1, 2);

        const numProds = persona < 0.1 ? 3 : Math.floor(Math.random() * 2) + 1;
        for (let i = 0; i < numProds; i++) {
          const prod = http.get(`${BASE}/product/${pick(PRODUCTS)}`,
            { ...P, tags: { ...P.tags, name: 'ProductPage' } });
          check(prod, {
            'product: 200':       r => r.status === 200,
            'product: has price': r => r.body && r.body.includes('$'),
          });
          think(1, 2);
        }

        if (persona >= 0.5) return;

        const add = http.post(`${BASE}/cart`, {
          product_id: pick(PRODUCTS),
          quantity:   String(Math.floor(Math.random() * 3) + 1),
        }, { ...P, tags: { ...P.tags, name: 'AddToCart' } });
        check(add, { 'addToCart: ok': r => r.status === 200 || r.status === 302 });

        const cart = http.get(`${BASE}/cart`, { ...P, tags: { ...P.tags, name: 'ViewCart' } });
        check(cart, { 'viewCart: 200': r => r.status === 200 });
        think(1, 3);

        if (persona >= 0.1) return;

        const co = http.post(`${BASE}/cart/checkout`, {
          email:                        'sre-1000vu@example.com',
          street_address:               '1000 Load Ave',
          zip_code:                     '10000',
          city:                         'ClusterCity',
          state:                        'CA',
          country:                      'US',
          credit_card_number:           '4432801561520454',
          credit_card_expiration_month: '1',
          credit_card_expiration_year:  '2030',
          credit_card_cvv:              '672',
        }, { ...P, tags: { ...P.tags, name: 'Checkout' } });
        check(co, {
          'checkout: ok':     r => r.status === 200 || r.status === 302,
          'checkout: no 5xx': r => r.status < 500,
        });
        think(2, 4);
      });
    }
---
# ── Job ───────────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-1000vu
  namespace: boutique
  labels:
    app: k6-loadtest
    version: v10
spec:
  # 20min test + 5min buffer
  activeDeadlineSeconds: 1800
  # Don't restart on failure — k6 exit code 1 = threshold breach, not crash
  backoffLimit: 0
  # Auto-cleanup 10min after completion (success or failure)
  # Removes the need to manually delete job + pod after each run
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: k6-loadtest
        version: v10
    spec:
      restartPolicy: Never
      # boutique-background PriorityClass is defined above in this file
      # value: -10, preemptionPolicy: Never — k6 yields resources to boutique pods
      priorityClassName: boutique-background
      containers:
        - name: k6
          image: grafana/k6:latest
          args:
            - run
            - /scripts/load-test.js
          env:
            - name: BASE_URL
              value: "http://frontend.boutique.svc.cluster.local:8080"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          volumeMounts:
            - name: k6-script
              mountPath: /scripts
      volumes:
        - name: k6-script
          configMap:
            name: k6-script-1000vu
