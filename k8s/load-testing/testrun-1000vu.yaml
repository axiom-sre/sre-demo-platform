# testrun-1000vu.yaml — k6 Operator TestRun CRD
# =============================================================================
# Industry-standard pattern: TestRun CR → Operator → distributed runner pods
#
# Architecture:
#   TestRun CRD (parallelism: 4)
#     → k6-operator-controller-manager reconciles
#     → 4x runner pods (250 VU each = 1000 VU total)
#     → in-cluster DNS: frontend.boutique.svc.cluster.local:8080
#     → Prometheus remote-write → Grafana dashboards
#
# Workflow:
#   kubectl apply -f namespace.yaml
#   kubectl apply -f rbac.yaml
#   kubectl apply -f script-configmap.yaml
#   kubectl apply -f testrun-1000vu.yaml
#
# Monitor:
#   kubectl get testruns -n load-testing -w
#   kubectl get pods -n load-testing -w
#   kubectl logs -f -l k6_cr=boutique-1000vu -n load-testing
#
# Cleanup (manual — no TTL on TestRun):
#   kubectl delete testrun boutique-1000vu -n load-testing
# =============================================================================
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: boutique-1000vu
  namespace: load-testing
  labels:
    app.kubernetes.io/part-of: sre-demo
    app.kubernetes.io/component: load-testing
    test-version: v1
    target: boutique
    vus: "1000"
spec:
  # 4 runners × 250 VU = 1000 VU total
  # Each runner is an independent pod — true distributed load generation
  parallelism: 4

  script:
    configMap:
      name: k6-boutique-1000vu-v1
      file: load-test.js

  # Prometheus remote-write — metrics flow directly into your LGTM stack
  # Visible in Grafana as k6_* metrics series
  arguments: >-
    --out experimental-prometheus-rw
  runner:
    image: grafana/k6:latest

    env:
      - name: BASE_URL
        value: "http://frontend.boutique.svc.cluster.local:8080"
      # Prometheus remote-write to in-cluster Prometheus
      - name: K6_PROMETHEUS_RW_SERVER_URL
        value: "http://prometheus.observability.svc.cluster.local:9090/api/v1/write"
      - name: K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM
        value: "true"
      # Tag all metrics with test run metadata
      - name: K6_PROMETHEUS_RW_PUSH_INTERVAL
        value: "5s"

    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi

    # Runners yield to boutique pods under resource pressure
    # Uses a standard PriorityClass value — no immutable field conflict
    # since this is a new namespace with no existing PriorityClass
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000

  # Starter job — initialises distributed test coordination
  starter:
    image: grafana/k6:latest
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
