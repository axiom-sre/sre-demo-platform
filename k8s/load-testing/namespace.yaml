# namespace.yaml — dedicated load-testing namespace
# =============================================================================
# Isolated from boutique namespace so load-gen pods never compete with app pods
# for quota. ResourceQuota sized for 4x k6 runner pods at 2CPU/2Gi each.
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: load-testing
  labels:
    app.kubernetes.io/part-of: sre-demo
    purpose: load-testing
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: load-testing-quota
  namespace: load-testing
spec:
  hard:
    requests.cpu: "6"
    requests.memory: 12Gi
    limits.cpu: "12"
    limits.memory: 16Gi
    pods: "12"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: load-testing-limits
  namespace: load-testing
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 250m
        memory: 256Mi
