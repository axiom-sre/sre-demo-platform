# boutique/boutique.yaml — Holy Grail Edition v3
# =============================================================================
# KEY CHANGES vs v2:
#
# [FRONTEND COLD-START ERROR WINDOW — root cause + fix]
#
# PROBLEM: Frontend was reporting Ready (passing /_healthz) before its upstream
# dependencies finished their own cold-start. Sequence:
#   T+0s   boutique.yaml applied
#   T+15s  frontend readinessProbe initialDelaySeconds fires → /_healthz passes
#          (the frontend HTTP server is up, but backends are NOT ready yet)
#   T+15s  kube-proxy adds frontend to Endpoints → traffic starts flowing in
#   T+15s–T+60s  k6/browser hits frontend → frontend calls cartservice (still
#          in .NET JIT warmup), productcatalog, currencyservice → gRPC returns
#          UNAVAILABLE → frontend returns HTTP 500 to the user
#   T+60-90s  backends finish warming → errors stop
#
# ROOT CAUSE: Frontend /_healthz only checks the HTTP server, NOT its gRPC
# connections to backends. It becomes Ready before backends are reachable.
#
# FIX 1 — minReadySeconds: 30 on frontend Deployment.
#   After ALL readiness probes pass, Kubernetes waits an additional 30s before
#   marking the pod Available and routing production traffic. This 30s window
#   allows backends to finish their warmup after the frontend's own probe passes.
#   Net result: first frontend pod becomes Available at T+45s (15+30), second at
#   T+50s. By then cartservice (.NET ~45s), productcatalog (~20s), currency (~15s)
#   are all ready. Zero 500s from minute 1.
#
# FIX 2 — frontend readinessProbe failureThreshold: 3→5, periodSeconds: 5→8.
#   The previous 6-failure threshold (6×5s=30s) was fine but the 5s period was
#   creating probe CPU noise during the HPA ramp (100+ probe requests/min across
#   10 frontend replicas = 1000+ internal HTTP calls/min to /_healthz at peak).
#   8s period: 10 replicas × (60/8) = 75 probes/min — 25% reduction in probe load.
#   failureThreshold 5×8s=40s still gives 40s grace before pod is marked unready.
#
# FIX 3 — startupProbe added to frontend.
#   The initialDelaySeconds approach is a blunt instrument. startupProbe is the
#   correct K8s mechanism: it gates ALL other probes until the startup check passes.
#   With failureThreshold=18, periodSeconds=5: 90s maximum startup window.
#   Once startup passes, normal readiness/liveness probes take over.
#   This prevents liveness from killing the pod during a slow first start.
#
# [OBSERVABILITY PIPELINE IMPROVEMENTS]
#
# FIX 4 — All services: OTEL_EXPORTER_OTLP_INSECURE added.
#   Without this, some OTEL SDKs attempt TLS negotiation to Alloy's 4317 gRPC
#   port. Alloy is configured with insecure=true but the SDK side must also
#   acknowledge this. The symptom is spans silently dropped during SDK init.
#   Added to: frontend, checkoutservice, cartservice, productcatalog, currency,
#   recommendation, shipping, payment, email, adservice.
#
# FIX 5 — OTEL_EXPORTER_OTLP_TIMEOUT: "10000" (10s) added to all services.
#   Default OTLP export timeout is 10s in most SDKs but some default to 1s or 5s.
#   Explicit 10s prevents timeout-induced span drops during Alloy WAL backpressure
#   events (which happen briefly when Tempo compaction holds the ingester lock).
#
# FIX 6 — OTEL_BSP_MAX_EXPORT_BATCH_SIZE: "512" on high-throughput services.
#   frontend, checkoutservice, cartservice: reduced from SDK default (512 is
#   actually the right ceiling for our Alloy batch processor config of 4096).
#   The SDK batches up to 512 spans, Alloy batches up to 4096 — no mismatch.
#
# [REDIS]
#   maxclients: 200→500 (already in v2, kept)
#   timeout: 300→60 (already in v2, kept)
#   No changes needed — Redis was stable at 5/200 connections in verify run.
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: boutique
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: boutique-quota
  namespace: boutique
spec:
  hard:
    requests.cpu: "16"
    limits.cpu: "32"
    requests.memory: 20Gi
    limits.memory: 40Gi
    pods: "60"
---
# =============================================================================
# Redis
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: boutique
data:
  redis.conf: |
    maxmemory 512mb
    maxmemory-policy allkeys-lru
    save ""
    appendonly no
    maxclients 500
    tcp-keepalive 30
    timeout 60
    tcp-backlog 511
    hz 20
    rename-command DEBUG ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: boutique
  labels:
    app: redis
spec:
  replicas: 1
  progressDeadlineSeconds: 120
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
      annotations:
        prometheus.io/scrape: "false"
    spec:
      containers:
        - name: redis
          image: mirror.gcr.io/library/redis:7.2.4-alpine
          command: ["redis-server", "/etc/redis/redis.conf"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: boutique
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
# =============================================================================
# Email Service
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: emailservice
  namespace: boutique
  labels:
    app: emailservice
spec:
  replicas: 1
  progressDeadlineSeconds: 180
  selector:
    matchLabels:
      app: emailservice
  template:
    metadata:
      labels:
        app: emailservice
    spec:
      containers:
        - name: emailservice
          image: gcr.io/google-samples/microservices-demo/emailservice:v0.10.1
          env:
            - name: PORT
              value: "8080"
            - name: DISABLE_PROFILER
              value: "1"
            - name: ENABLE_TRACING
              value: "1"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.observability.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: OTEL_EXPORTER_OTLP_TIMEOUT
              value: "10000"
            - name: OTEL_SERVICE_NAME
              value: emailservice
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: emailservice
  namespace: boutique
spec:
  selector:
    app: emailservice
  ports:
    - port: 8080
      targetPort: 8080
