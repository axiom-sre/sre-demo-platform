            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 50m        # observed: 2m idle. JVM — headroom for GC
              memory: 512Mi   # was 350Mi — actual observed 419-556Mi; request now above floor
            limits:
              cpu: 800m
              memory: 768Mi
---
