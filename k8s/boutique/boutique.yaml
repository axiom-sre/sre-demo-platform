---
# =============================================================================
# Frontend — cold-start error window eliminated
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: boutique
  labels:
    app: frontend
spec:
  replicas: 2
  progressDeadlineSeconds: 300
  # KEY FIX: minReadySeconds gates traffic until backends are warm.
  # After all readiness probes pass, K8s waits 30s before marking
  # the pod Available and routing LoadBalancer traffic to it.
  # Sequence: image pull → container start → startupProbe → readinessProbe
  # → 30s minReadySeconds wait → Available → traffic.
  # By T+45s, all backends (including .NET cart ~45s, JVM ad ~45s) are ready.
  minReadySeconds: 30
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/_healthz"
    spec:
      containers:
        - name: frontend
          image: gcr.io/google-samples/microservices-demo/frontend:v0.10.1
          env:
            - name: PORT
              value: "8080"
            - name: DISABLE_PROFILER
              value: "1"
            - name: ENABLE_TRACING
              value: "1"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.observability.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: OTEL_EXPORTER_OTLP_TIMEOUT
              value: "10000"
            - name: OTEL_BSP_MAX_EXPORT_BATCH_SIZE
              value: "512"
            - name: OTEL_SERVICE_NAME
              value: frontend
            - name: COLLECTOR_SERVICE_ADDR
              value: "alloy.observability.svc.cluster.local:4317"
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "productcatalogservice.boutique.svc.cluster.local:3550"
            - name: CURRENCY_SERVICE_ADDR
              value: "currencyservice.boutique.svc.cluster.local:7000"
            - name: CART_SERVICE_ADDR
              value: "cartservice.boutique.svc.cluster.local:7070"
            - name: RECOMMENDATION_SERVICE_ADDR
              value: "recommendationservice.boutique.svc.cluster.local:8080"
            - name: SHIPPING_SERVICE_ADDR
              value: "shippingservice.boutique.svc.cluster.local:50051"
            - name: CHECKOUT_SERVICE_ADDR
              value: "checkoutservice.boutique.svc.cluster.local:5050"
            - name: AD_SERVICE_ADDR
              value: "adservice.boutique.svc.cluster.local:9555"
            - name: SHOPPING_ASSISTANT_SERVICE_ADDR
              value: "shoppingassistantservice.boutique.svc.cluster.local:80"
          ports:
            - containerPort: 8080
          # startupProbe: gates readiness/liveness until HTTP server is up.
          # Prevents liveness from killing the pod during slow cold-start.
          startupProbe:
            httpGet:
              path: "/_healthz"
              port: 8080
              httpHeaders:
                - name: "Cookie"
                  value: "shop_session-id=x-startup-probe"
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 18    # 10 + 18×5 = 100s max startup window
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: "/_healthz"
              port: 8080
              httpHeaders:
                - name: "Cookie"
                  value: "shop_session-id=x-readiness-probe"
            # No initialDelaySeconds — startupProbe handles the gate
            periodSeconds: 8        # reduced from 5s — cuts probe noise at 10 replicas
            failureThreshold: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: "/_healthz"
              port: 8080
              httpHeaders:
                - name: "Cookie"
                  value: "shop_session-id=x-liveness-probe"
            initialDelaySeconds: 25
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: boutique
spec:
  selector:
    app: frontend
  type: LoadBalancer
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: boutique
spec:
  # minAvailable 1 (not 2): during rolling restarts with minReadySeconds=30,
  # having minAvailable=2 can block the rollout when both pods are in the
  # minReadySeconds wait window simultaneously.
  # 1 pod always serving is the correct constraint for a 2-replica deployment.
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
