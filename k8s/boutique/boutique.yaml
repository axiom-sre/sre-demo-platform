# ── Cart Service ──────────────────────────────────────────────────────────────
# This is the most sensitive service in the stack. Read all comments carefully.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartservice
  namespace: boutique
  labels:
    app: cartservice
spec:
  replicas: 2
  progressDeadlineSeconds: 360
  selector:
    matchLabels:
      app: cartservice
  template:
    metadata:
      labels:
        app: cartservice
    spec:
      # Guarantee cartservice pods get scheduled before lower-priority services
      # if the node is under memory pressure. Boutique is the demo — it must win.
      priorityClassName: boutique-high
      containers:
        - name: cartservice
          image: gcr.io/google-samples/microservices-demo/cartservice:v0.10.1
          env:
            - name: REDIS_ADDR
              value: "redis.boutique.svc.cluster.local:6379"
            # Cap StackExchange.Redis connection pool per pod.
            # Default is ThreadCount×2 (can be 16+ on ARM64 M-series).
            # 5 pods × 10 connections = 50 max — well within Redis maxclients 500.
            # This is the single most important tuning for crash-restart resilience.
            - name: CART_SERVICE_MAX_REDIS_CONNECTIONS
              value: "10"
            - name: ENABLE_TRACING
              value: "1"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.observability.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: cartservice
            - name: COLLECTOR_SERVICE_ADDR
              value: "alloy.observability.svc.cluster.local:4317"

            # ── .NET GC heap limit — CRITICAL for ARM64 / Apple Silicon ──────
            # Without this, the .NET GC sees the HOST 64GB (via Hypervisor),
            # allocates accordingly, then the kubelet OOMKills mid-GC cycle.
            # 805306368 = 768Mi. Container limit is 1Gi. This leaves 256Mi
            # for CLR overhead, thread stacks, and native gRPC buffers.
            - name: DOTNET_GCHeapHardLimit
              value: "805306368"

            # Conservative GC mode: favors lower heap size over throughput.
            # Right call for a service that's I/O-bound on Redis, not CPU-bound.
            - name: DOTNET_GCConserve
              value: "1"

            # Reduce thread spin cost on gRPC connection pools.
            # Apple M-series has different SMT topology than x86 HT.
            # Without this, the thread pool spins aggressively on ARM64
            # and burns CPU that should go to actual Redis I/O.
            - name: DOTNET_ThreadPool_UnfairSemaphoreSpinLimit
              value: "6"

            # Server GC mode provides better throughput for server workloads.
            # Docker Desktop on M-series reports logical CPU count correctly
            # so Server GC will use the right number of heaps.
            - name: DOTNET_gcServer
              value: "1"

          ports:
            - containerPort: 7070
          readinessProbe:
            tcpSocket: { port: 7070 }
            # .NET 8 on ARM64 JIT warmup + gRPC server init + Redis connection
            # pool establishment takes 15-25s on cold Docker Desktop.
            initialDelaySeconds: 25
            periodSeconds: 5
            failureThreshold: 10   # 25 + (10*5) = 75s total readiness window
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket: { port: 7070 }
            # Long fuse: only kill if truly wedged. .NET GC pauses can make
            # the service appear hung for 5-10s during major collection.
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5    # 60 + (5*20) = 160s before first liveness kill
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1500m
              memory: 1Gi   # DOTNET_GCHeapHardLimit=768Mi fits inside 1Gi limit
---
apiVersion: v1
kind: Service
metadata:
  name: cartservice
  namespace: boutique
spec:
  selector:
    app: cartservice
  ports:
    - port: 7070
      targetPort: 7070
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cartservice-pdb
  namespace: boutique
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: cartservice
---
