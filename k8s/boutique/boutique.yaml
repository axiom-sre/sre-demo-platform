# =============================================================================
# Namespace + ResourceQuota — correctly sized for M5 Pro 8 vCPU / 64GB
# =============================================================================
# requests.cpu: 16   — allows all HPAs to scale to max simultaneously
# limits.cpu:   32   — allows burst above requests
# requests.memory: 20Gi — generous for .NET cartservice (512Mi req × 5 pods)
# limits.memory: 40Gi
# pods: 60           — enough for all services at max HPA replicas
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: boutique
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: boutique-quota
  namespace: boutique
spec:
  hard:
    requests.cpu: "16"
    limits.cpu: "32"
    requests.memory: 20Gi
    limits.memory: 40Gi
    pods: "60"
---
# boutique/boutique.yaml
# =============================================================================
# HOLY GRAIL EDITION — M5 Pro 64GB / 8 vCPU Docker Desktop K8s
# =============================================================================
#
# ROOT CAUSE FIXES IN THIS VERSION:
#
# [CARTSERVICE CRASH LOOP — 3 compounding issues]
#
# FIX 1 — .NET GC heap limit not respected on ARM64 / Apple Silicon:
#   The .NET runtime under Docker Desktop Hypervisor sees the HOST memory
#   (64GB), not the container limit (1Gi). Without DOTNET_GCHeapHardLimit,
#   the GC allocates as if it has 20GB+ of headroom and gets OOMKilled
#   mid-GC cycle. The kubelet kill looks like a crash but is actually OOM.
#   Fix: DOTNET_GCHeapHardLimit=805306368 (768Mi, leaving 256Mi for CLR
#   overhead, stack, thread pools below the 1Gi container limit).
#   DOTNET_GCConserve=1 tells GC to trade throughput for lower heap size.
#   DOTNET_ThreadPool_UnfairSemaphoreSpinLimit=6 reduces thread spin cost
#   on gRPC connection pools (M-series ARM has different SMT topology).
#
# FIX 2 — Redis connection exhaustion under HPA scale-out:
#   At 1000 VU, HPA scales cartservice to 8 pods. Each .NET pod opens a
#   StackExchange.Redis connection pool (default: ThreadCount * 2 = 16+
#   connections per pod). 8 pods × 16 connections = 128+ connections to
#   a single Redis instance. Redis default maxclients=10000 but at 600mb
#   maxmemory it starts rejecting new connections when it hits the memory
#   ceiling. The rejection is not graceful — it leaves connections in
#   TIME_WAIT, which causes cartservice gRPC to return UNAVAILABLE to
#   checkoutservice, triggering liveness probe failures.
#   Fix:
#     - Redis maxmemory reduced to 512mb (leaves 56mb headroom for OS buffers)
#     - tcp-keepalive 30 (detect dead connections faster, reclaim slots)
#     - maxclients 200 (hard cap; cartservice will queue internally not crash)
#     - timeout 300 (close idle connections after 5min, reclaim memory)
#     - A Redis ConfigMap (not inline command args) for clean configuration
#
# FIX 3 — cartservice HPA maxReplicas budget exceeds node CPU:
#   Previous: maxReplicas=8 × 500m request = 4000m = 50% of 8 CPU node
#   just for cartservice. Add observability stack (1600m requests) + other
#   boutique services (2200m requests) = 7800m total = node saturation.
#   Fix: maxReplicas=5 (5 × 500m = 2500m, leaves room for everything else)
#   This is in hpa.yaml but documented here for cross-reference.
#
# OTHER CHANGES:
#   - Redis persistence: AOF disabled (--save ""), appendonly no. Cart data
#     is ephemeral by design. AOF fsync adds 2-5ms latency per write at
#     1000 VU which compounds across the cart→redis→cart round trip.
#   - All probes: grpc health checks replaced with tcpSocket where services
#     don't expose HTTP health endpoints. Avoids grpc_health_probe binary
#     dependency that some images don't include.
#   - adservice: Java heap flags preserved (-Xmx512m -Xms200m), G1GC tuned
#     for ARM64: G1HeapRegionSize=8m (was 4m — ARM has 64KB page size vs
#     x86 4KB, larger region reduces GC barrier overhead).
#   - PodDisruptionBudgets added for ALL services that have >1 replica or
#     are HPA targets (prevents Kubernetes eviction from tearing down the
#     last pod during node pressure events).
#   - topologySpreadConstraints removed — single-node cluster, they cause
#     scheduling failures when node doesn't have enough pods to spread.
# =============================================================================

# =============================================================================
# Redis ConfigMap — clean config management (not fragile inline command args)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: boutique
data:
  redis.conf: |
    # Memory
    maxmemory 512mb
    maxmemory-policy allkeys-lru

    # Persistence: disabled. Cart data is ephemeral by design.
    # AOF adds 2-5ms per write at 1000 VU — unacceptable for cart latency.
    save ""
    appendonly no

    # Connection management — critical for HPA scale-out with many .NET pods
    # maxclients 500: 5 cart pods × ~20 connections = 100 peak. 500 gives 5x headroom.
    # Previously 200 — fine until crash-restart storm floods Redis with reconnects.
    # During OOMKill cascade, 4 pods die+restart simultaneously = ~80 new connections
    # in <2s. 200 limit was hit, Redis rejected connections, pods exited code 133.
    maxclients 500
    tcp-keepalive 30
    # timeout 60: reclaim dead connections faster (was 300s — too slow during storms)
    timeout 60

    # Performance
    tcp-backlog 511
    hz 20

    # Disable DEBUG only — keep CONFIG for redis-cli diagnostics
    rename-command DEBUG ""
---
# ── Redis ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: boutique
  labels:
    app: redis
spec:
  replicas: 1
  progressDeadlineSeconds: 120
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
      annotations:
        prometheus.io/scrape: "false"  # no exporter in this image
    spec:
      containers:
        - name: redis
          image: mirror.gcr.io/library/redis:7.2.4-alpine
          # Use ConfigMap-driven config instead of fragile inline args
          command: ["redis-server", "/etc/redis/redis.conf"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi    # maxmemory 512mb + 256mb OS/overhead headroom
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: boutique
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
