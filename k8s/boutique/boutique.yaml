            tcpSocket: { port: 5050 }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket: { port: 5050 }
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: checkoutservice
  namespace: boutique
spec:
  selector:
    app: checkoutservice
  ports:
    - port: 5050
      targetPort: 5050
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: checkoutservice-pdb
  namespace: boutique
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: checkoutservice
---
# ── Frontend ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: boutique
  labels:
    app: frontend
spec:
  replicas: 2
  progressDeadlineSeconds: 300
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: gcr.io/google-samples/microservices-demo/frontend:v0.10.1
          env:
            - name: PORT
              value: "8080"
            - name: DISABLE_PROFILER
              value: "1"
            - name: ENABLE_TRACING
              value: "1"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.observability.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: frontend
            - name: COLLECTOR_SERVICE_ADDR
              value: "alloy.observability.svc.cluster.local:4317"
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "productcatalogservice.boutique.svc.cluster.local:3550"
            - name: CURRENCY_SERVICE_ADDR
              value: "currencyservice.boutique.svc.cluster.local:7000"
            - name: CART_SERVICE_ADDR
              value: "cartservice.boutique.svc.cluster.local:7070"
            - name: RECOMMENDATION_SERVICE_ADDR
              value: "recommendationservice.boutique.svc.cluster.local:8080"
            - name: SHIPPING_SERVICE_ADDR
              value: "shippingservice.boutique.svc.cluster.local:50051"
            - name: CHECKOUT_SERVICE_ADDR
              value: "checkoutservice.boutique.svc.cluster.local:5050"
            - name: AD_SERVICE_ADDR
              value: "adservice.boutique.svc.cluster.local:9555"
            # REQUIRED: mustMapEnv() in main.go panics if unset.
            # Sentinel value is safe — k6 never hits /assistant or /bot paths.
            - name: SHOPPING_ASSISTANT_SERVICE_ADDR
              value: "shoppingassistantservice.boutique.svc.cluster.local:80"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: "/_healthz"
              port: 8080
              httpHeaders:
                - name: "Cookie"
                  value: "shop_session-id=x-readiness-probe"
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: "/_healthz"
              port: 8080
              httpHeaders:
                - name: "Cookie"
                  value: "shop_session-id=x-liveness-probe"
            initialDelaySeconds: 25
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: boutique
spec:
  selector:
    app: frontend
  type: LoadBalancer
  ports:
    - port: 8080
      targetPort: 8080
      # LoadBalancer on Docker Desktop maps EXTERNAL-IP=localhost automatically.
      # NodePort was unreliable — Docker Desktop routes NodePorts through the
      # Linux VM network namespace which doesn't reach macOS localhost.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: boutique
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: frontend
