# =============================================================================
# Recommendation Service
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendationservice
  namespace: boutique
  labels:
    app: recommendationservice
spec:
  replicas: 2
  progressDeadlineSeconds: 240
  # minReadySeconds: Python import + model load takes 15-20s after port opens.
  # Without this, new HPA pods are routed traffic during Python warmup → 503s.
  minReadySeconds: 20
  selector:
    matchLabels:
      app: recommendationservice
  template:
    metadata:
      labels:
        app: recommendationservice
    spec:
      # terminationGracePeriodSeconds: gives Python time to drain in-flight
      # gRPC requests before SIGKILL. Default 30s, made explicit here.
      terminationGracePeriodSeconds: 30
      containers:
        - name: recommendationservice
          image: gcr.io/google-samples/microservices-demo/recommendationservice:v0.10.1
          env:
            - name: PORT
              value: "8080"
            - name: DISABLE_PROFILER
              value: "1"
            - name: ENABLE_TRACING
              value: "1"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.observability.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: OTEL_EXPORTER_OTLP_TIMEOUT
              value: "10000"
            - name: OTEL_SERVICE_NAME
              value: recommendationservice
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "productcatalogservice.boutique.svc.cluster.local:3550"
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 4
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 25
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 25m        # observed: 2m idle. Python — keep some headroom for import spike
              memory: 128Mi   # was 128Mi — actual ~74-81Mi, keep for Python GC
            limits:
              cpu: 800m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: recommendationservice
  namespace: boutique
spec:
  selector:
    app: recommendationservice
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: recommendationservice-pdb
  namespace: boutique
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: recommendationservice
