    app: adservice
spec:
  replicas: 1
  progressDeadlineSeconds: 420
  selector:
    matchLabels:
      app: adservice
  template:
    metadata:
      labels:
        app: adservice
    spec:
      containers:
        - name: adservice
          image: gcr.io/google-samples/microservices-demo/adservice:v0.10.1
          env:
            - name: PORT
              value: "9555"
            - name: DISABLE_PROFILER
              value: "1"
            - name: ENABLE_TRACING
              value: "1"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.observability.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: adservice
            - name: COLLECTOR_SERVICE_ADDR
              value: "alloy.observability.svc.cluster.local:4317"
            # ARM64 JVM tuning: G1HeapRegionSize=8m (was 4m)
            # ARM64 has 64KB page size vs x86 4KB — larger regions reduce
            # GC write barrier overhead significantly on Apple Silicon.
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx512m -Xms200m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:G1HeapRegionSize=8m -XX:+UseContainerSupport"
          ports:
            - containerPort: 9555
          readinessProbe:
            tcpSocket: { port: 9555 }
            initialDelaySeconds: 25
            periodSeconds: 5
            failureThreshold: 8
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket: { port: 9555 }
            initialDelaySeconds: 50
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 350Mi
            limits:
              cpu: 800m
              memory: 768Mi
---
