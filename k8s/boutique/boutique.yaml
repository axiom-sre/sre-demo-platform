# boutique/boutique.yaml — Holy Grail Edition v6
# =============================================================================
# KEY CHANGES vs v5:
#
# [FIX 1 — ResourceQuota removed from this file]
#   Root cause: boutique.yaml and namespaces.yaml both defined boutique-quota.
#   Whichever was applied last won. boutique.yaml's "4" CPU quota was winning
#   in the live cluster, blocking HPA from scheduling pods at 5K VU.
#   Fix: ResourceQuota lives exclusively in namespaces/namespaces.yaml ("16").
#   Single source of truth. No more drift.
#
# [FIX 2 — currencyservice memory request: 64Mi → 128Mi]
#   Actual observed at 1000 VU: 97Mi per pod (kubectl top).
#   OOMKills were occurring at the 128Mi *limit* (v5), not the request.
#   Root cause: request=64Mi placed pods on nodes with <128Mi free,
#   then load pushed them to OOMKill before HPA could react.
#   Fix: request=128Mi, limit=256Mi. Scheduler now places pods correctly.
#   This resolves the known open issue from the roadmap.
#
# [FIX 3 — adservice memory request: 350Mi → 512Mi]
#   Actual observed: 419-556Mi (kubectl top). Request was below actual usage.
#   Scheduler bin-packed adservice into nodes with only 350Mi free — correct
#   eviction ordering broke (adservice evicted before lower-priority services).
#   Fix: request=512Mi matches the observed floor. Limit stays at 768Mi.
#
# [FIX 4 — PodDisruptionBudgets added for shippingservice and paymentservice]
#   Missing PDBs meant chaos engineering (next phase) could take both down
#   simultaneously during node drain or disruption. Added minAvailable: 1.
#
# [FIX 5 — Namespace declaration removed from this file]
#   boutique namespace is owned by namespaces/namespaces.yaml.
#   Duplicate declaration here caused confusion about which file owns it.
#
# NODE BUDGET MATH (v6 — updated for correct currency maxReplicas=10):
#   frontend:      10 × 50m  =  500m
#   productcat:     6 × 30m  =  180m
#   cart:           5 × 50m  =  250m
#   checkout:       6 × 25m  =  150m
#   currency:      10 × 15m  =  150m   ← was showing 6 in v5 header (stale)
#   recommend:      5 × 25m  =  125m
#   adservice:      1 × 30m  =   30m   (no HPA — JVM startup cost too high)
#   fixed services (redis/email/payment/shipping): ~155m
#   Total boutique at max HPA:  ~1540m requests
#   Observability stack:         ~800m
#   kube-system:                 ~400m
#   Grand total:                ~2740m / 8000m = 34% — massive headroom ✓
#
# [1000 VU VALIDATED RESULTS — carried forward from v5]
#   p95: 660ms  (threshold: 2000ms) — 3× under
#   p99: 1.2s   (threshold: 8000ms) — 6× under
#   errors: 0.07% → 0.00% after minReadySeconds fix
#   availability: 99.997%
#   node CPU at peak: 10.4% of M5 Pro 8 vCPU
#   Active boutique pods at peak: 31
# =============================================================================

# =============================================================================
# RBAC — HPA controller authorization fix
# Fixes: Warning FailedGetScale Unauthorized (seen in kubectl describe hpa)
# The system:controller:horizontal-pod-autoscaler ClusterRole already exists;
# we just need to bind it to the kube-system service account explicitly.
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hpa-controller-boutique
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:controller:horizontal-pod-autoscaler
subjects:
  - kind: ServiceAccount
    name: horizontal-pod-autoscaler
    namespace: kube-system
---
# =============================================================================
# Redis
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: boutique
data:
  redis.conf: |
    maxmemory 512mb
    maxmemory-policy allkeys-lru
    save ""
    appendonly no
    maxclients 500
    tcp-keepalive 30
    timeout 60
    tcp-backlog 511
    hz 20
    rename-command DEBUG ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: boutique
  labels:
    app: redis
spec:
  replicas: 1
  progressDeadlineSeconds: 120
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
      annotations:
        prometheus.io/scrape: "false"
    spec:
      priorityClassName: boutique-high   # Redis loss = cart loss = demo dead
      containers:
        - name: redis
          image: mirror.gcr.io/library/redis:7.2.4-alpine
          command: ["redis-server", "/etc/redis/redis.conf"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m        # observed: 3m idle, 10-20m under load
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: boutique
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
