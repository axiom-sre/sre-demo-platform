# =============================================================================
# Cart Service — .NET, Apple Silicon tuned
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartservice
  namespace: boutique
  labels:
    app: cartservice
spec:
  replicas: 2
  progressDeadlineSeconds: 300
  selector:
    matchLabels:
      app: cartservice
  template:
    metadata:
      labels:
        app: cartservice
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7070"
    spec:
      priorityClassName: boutique-high
      containers:
        - name: cartservice
          image: gcr.io/google-samples/microservices-demo/cartservice:v0.10.1
          env:
            - name: REDIS_ADDR
              value: "redis.boutique.svc.cluster.local:6379"
            - name: PORT
              value: "7070"
            - name: DISABLE_PROFILER
              value: "1"
            - name: ENABLE_TRACING
              value: "1"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.observability.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: OTEL_EXPORTER_OTLP_TIMEOUT
              value: "10000"
            - name: OTEL_BSP_MAX_EXPORT_BATCH_SIZE
              value: "512"
            - name: OTEL_SERVICE_NAME
              value: cartservice
            # ARM64 .NET tuning — JIT assertion crash fix for Apple Silicon
            - name: DOTNET_EnableWriteXorExecute
              value: "0"
            - name: DOTNET_GCConserve
              value: "0"
            - name: DOTNET_GCDynamicAdaptationMode
              value: "1"
            - name: DOTNET_ThreadPool_UnfairSemaphoreSpinLimit
              value: "6"
          ports:
            - containerPort: 7070
          startupProbe:
            tcpSocket: { port: 7070 }
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 24    # 15 + 24×5 = 135s max startup window for .NET JIT
            timeoutSeconds: 3
          readinessProbe:
            tcpSocket: { port: 7070 }
            periodSeconds: 8
            failureThreshold: 5
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket: { port: 7070 }
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 50m        # observed: 1-2m idle. Kept higher for .NET JIT spike.
              memory: 256Mi   # actual observed: 153-180Mi. Headroom for JIT warmup.
            limits:
              cpu: 1500m      # keep: .NET JIT warmup can spike to 800-1200m briefly
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cartservice
  namespace: boutique
spec:
  selector:
    app: cartservice
  ports:
    - port: 7070
      targetPort: 7070
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cartservice-pdb
  namespace: boutique
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: cartservice
---
