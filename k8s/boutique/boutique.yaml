# =============================================================================
# Product Catalog Service
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: productcatalogservice
  namespace: boutique
  labels:
    app: productcatalogservice
spec:
  replicas: 2
  progressDeadlineSeconds: 180
  # minReadySeconds: gates traffic after readiness probe passes.
  # tcpSocket passes when port 3550 opens (~5s). Go catalog cache needs
  # ~10s more. Without this, HPA new pods get traffic before ready → 503s.
  # Confirmed root cause of 0.07% errors at 1000VU.
  minReadySeconds: 10
  selector:
    matchLabels:
      app: productcatalogservice
  template:
    metadata:
      labels:
        app: productcatalogservice
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3550"
    spec:
      priorityClassName: boutique-high
      containers:
        - name: productcatalogservice
          image: gcr.io/google-samples/microservices-demo/productcatalogservice:v0.10.1
          env:
            - name: PORT
              value: "3550"
            - name: DISABLE_PROFILER
              value: "1"
            - name: ENABLE_TRACING
              value: "1"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.observability.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: OTEL_EXPORTER_OTLP_TIMEOUT
              value: "10000"
            - name: OTEL_SERVICE_NAME
              value: productcatalogservice
            - name: COLLECTOR_SERVICE_ADDR
              value: "alloy.observability.svc.cluster.local:4317"
          ports:
            - containerPort: 3550
          readinessProbe:
            tcpSocket: { port: 3550 }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 4
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket: { port: 3550 }
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 60m        # observed: 1-3m idle. HPA fires at 15m (50% × 30m)
              memory: 64Mi    # actual usage ~33-44Mi — headroom adequate
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: productcatalogservice
  namespace: boutique
spec:
  selector:
    app: productcatalogservice
  ports:
    - port: 3550
      targetPort: 3550
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: productcatalogservice-pdb
  namespace: boutique
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: productcatalogservice
---
