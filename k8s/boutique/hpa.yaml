# hpa.yaml — Boutique HPA definitions (all services)
# =============================================================================
# VERSION HISTORY:
#   v1 — CPU-only HPA on all services
#   v2 — Added memory triggers to memory-sensitive services
#        paymentservice: 91.4% memory observed at 1000 VU (2026-04-24)
#        emailservice:   63.8% memory observed at 1000 VU
#        currencyservice: 63.7% memory observed at 1000 VU
#        adservice:      54.3% memory observed at 1000 VU
#
# SCALING PHILOSOPHY:
#   - Scale up fast (15s stabilization, +2 pods per 30s)
#   - Scale down slow (120s stabilization) — avoids thrash
#   - Memory threshold at 65% — gives headroom before OOMKill
#   - CPU threshold tuned per service characteristics
#
# CAPACITY BASELINE (2026-04-24 capacity test):
#   Safe operating point: 500 VU / 6,200 req/s
#   Saturation point:     600 VU / 7,000 req/s
#   paymentservice OOMKill risk confirmed at 1000 VU
# =============================================================================

# ── frontend ──────────────────────────────────────────────────────────────────
# Memory added: frontend hits 36% at 1000 VU — not critical but worth tracking
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend
  namespace: boutique
  labels:
    app: frontend
    hpa-version: v2
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      selectPolicy: Max
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120
      selectPolicy: Max
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
---
