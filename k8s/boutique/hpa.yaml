# boutique/hpa.yaml — Holy Grail Edition v6
# =============================================================================
# KEY CHANGES v6 — Runtime-Aware HPA Design:
#
# CORE PRINCIPLE: Memory-based HPA only works for runtimes that promptly
# release RSS back to the OS after load. Go does this via MADV_FREE.
# Python, Node.js, .NET, and JVM do NOT — they hold pages in internal
# allocator pools. Memory-based HPA on these runtimes causes pods to get
# stuck above minReplicas indefinitely after load ends.
#
# MEMORY TRIGGER — KEEP for Go services only:
#   frontend (Go)       ✓ releases RSS promptly
#   checkoutservice (Go) ✓ releases RSS promptly
#   shippingservice (Go) ✓ releases RSS promptly
#
# MEMORY TRIGGER — REMOVED from non-Go services:
#   recommendationservice (Python) — pymalloc never releases pages to OS
#   cartservice (.NET)             — GC-managed, slow release
#   paymentservice (Node.js)       — V8 GC releases slowly
#   currencyservice (Node.js)      — same as payment
#
# SCALEDOWN POLICY — tuned per service type:
#   Customer-facing / fan-out orchestrators: 1 pod/60s, 300s window (conservative)
#   Stateless background workers:            2 pods/60s, 120s window (fast)
#   .NET services with JIT warmup:           1 pod/60s, 300s window (conservative)
#
# [FIX 1 — recommendationservice: memory trigger removed, scaleDown 300→120s]
#   Python RSS stays elevated post-load due to pymalloc. Confirmed by observing
#   5 pods stuck for 60+ minutes post 1000 VU test with 57% memory utilization
#   against 65% target. CPU was at 3% — the pod was idle, memory lied.
#   scaleDown window cut to 120s — Python CPU drops to idle immediately.
#
# [FIX 2 — productcatalogservice: scaleDown window 300→180s, rate 1→2 pods]
#   Go service, stateless. No warmup cost. Faster scale-down is safe.
#
# [FIX 3 — currencyservice: scaleDown window 300→180s, rate 1→2 pods]
#   Go service (note: upstream is Node.js but this image is Go-based).
#   Stateless, no warmup cost. Faster scale-down reduces idle pod waste.
#
# [FIX 4 — shippingservice: scaleDown window 300→120s, rate 1→2 pods]
#   Go service, fully stateless, no downstream state. Fast scale-down is safe.
#
# [FIX 5 — paymentservice: scaleDown window 300→120s, rate 1→2 pods]
#   Node.js, stateless. No JIT warmup. Fast scale-down is safe.
#
# NODE BUDGET v6: unchanged from v5 — ~5070m / ~48000m M5 Pro = 10.6%
# =============================================================================

# ── Frontend — Go: MEMORY PRIMARY (correct — Go releases RSS promptly) ────────
#
# Memory trigger: 60% × 128Mi = 77Mi → goroutine queue depth proxy
# CPU trigger:    50% × 50m   = 25m  → safety net
# scaleDown: conservative — customer-facing, 1 pod/60s, 300s window
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 60    # 60% × 128Mi = 77Mi — goroutine queue proxy
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50    # 50% × 50m = 25m — secondary safety net
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 3
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300    # conservative — customer-facing
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── Product Catalog — Go: CPU-only, faster scaleDown ─────────────────────────
#
# Go service, stateless product catalog reads. No warmup cost on new pods.
# CPU trigger: 50% × 60m = 30m actual
# scaleDown: medium — 2 pods/60s, 180s window
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: productcatalogservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: productcatalogservice
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50    # 50% × 60m = 30m actual trigger
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 180    # was 300 — Go stateless, safe to be faster
      policies:
        - type: Pods
          value: 2                       # was 1 — scale 2 at a time for faster recovery
          periodSeconds: 60
---
# ── Recommendation — Python: CPU-ONLY (memory trigger permanently removed) ────
#
# REASON: Python's pymalloc allocator does not release RSS pages back to the
# OS after peak load. Post-test RSS stays at ~75Mi (57% of 128Mi request)
# indefinitely. Memory-based HPA sees this as "still under load" and refuses
# to scale down. Confirmed: 5 pods stuck for 60+ minutes post 1000 VU test.
#
# CPU is the only reliable signal for Python GIL-bound services.
# The GIL means each pod handles one thread regardless of memory.
# CPU directly reflects whether the pod is processing requests.
#
# scaleDown: aggressive — Python CPU drops to idle instantly, no warmup cost.
# 120s window + 2 pods/60s means 5→2 takes ~3 minutes after load ends.
# Previously took 60+ minutes due to memory trigger holding replicas up.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: recommendationservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: recommendationservice
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 55    # 55% × 50m = 27m — Python GIL, pods are fix
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120    # was 300 — Python CPU is instant signal
      policies:
        - type: Pods
          value: 2                       # was 1 — faster recovery to minReplicas
          periodSeconds: 60
---
# ── Cart — .NET: CPU-only, conservative scaleDown (JIT warmup cost) ───────────
#
# .NET JIT warmup spikes CPU to 800-1200m on first requests per pod.
# Memory trigger removed — .NET GC holds managed heap after peak load.
# scaleUp: 60s stabilization to average through JIT spike — DO NOT REDUCE.
# scaleDown: conservative — JIT warmup makes new pods expensive. Keep 300s.
# CPU trigger: 60% × 50m = 30m actual
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cartservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cartservice
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # 60% × 50m = 30m actual trigger
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60    # KEEP: .NET JIT spike averaging
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300    # KEEP: JIT warmup makes new pods expensive
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── Checkout — Go: MEMORY PRIMARY (correct — I/O-bound goroutine proxy) ───────
#
# Go service, I/O-bound fan-out orchestrator. Memory rises with goroutine
# queue depth. Go releases RSS promptly — memory trigger is correct here.
# scaleDown: conservative — fan-out means checkout failure cascades broadly.
# Memory trigger: 65% × 128Mi = 83Mi
# CPU trigger:    60% × 100m  = 60m — secondary
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: checkoutservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: checkoutservice
  minReplicas: 4
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 65    # 65% × 128Mi = 83Mi — goroutine queue depth
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # 60% × 100m = 60m — secondary
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 3
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300    # conservative — fan-out cascades on failure
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── Currency — Go: CPU-only, medium scaleDown ─────────────────────────────────
#
# Go service, stateless currency conversion. Called on every page render.
# CPU trigger: 60% × 50m = 30m actual
# scaleDown: medium — 2 pods/60s, 180s window. Stateless, no warmup cost.
# Note: sync.Once cache (roadmap) will reduce steady-state pod count significantly.
# After cache is implemented: lower maxReplicas 12→6 and minReplicas 4→2.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: currencyservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: currencyservice
  minReplicas: 4
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # 60% × 50m = 30m actual trigger
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 180    # was 300 — Go stateless, safe to be faster
      policies:
        - type: Pods
          value: 2                       # was 1 — faster recovery to minReplicas
          periodSeconds: 60
---
# ── Shipping — Go: MEMORY + CPU, fast scaleDown ───────────────────────────────
#
# Go service, fully stateless. Memory trigger is correct — Go releases RSS.
# scaleDown: aggressive — no state, no warmup cost, no downstream cascade risk.
# CPU trigger:    60% × 50m  = 30m
# Memory trigger: 65% × 64Mi = 42Mi — goroutine burst proxy
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shippingservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shippingservice
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # 60% × 50m = 30m actual
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 65    # 65% × 64Mi = 42Mi — goroutine proxy
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120    # was 300 — Go stateless, fast is safe
      policies:
        - type: Pods
          value: 2                       # was 1 — faster recovery
          periodSeconds: 60
---
# ── Payment — Node.js: CPU-only, fast scaleDown ───────────────────────────────
#
# Node.js single-threaded event loop. Memory trigger removed — V8 GC holds
# heap after peak load similarly to Python. CPU is the correct signal.
# scaleDown: aggressive — Node.js has no JIT warmup cost (V8 JIT is fast),
# stateless, no downstream cascade risk.
# CPU trigger: 60% × 50m = 30m actual
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: paymentservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: paymentservice
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # 60% × 50m = 30m actual — correct for Node.js
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120    # was 300 — Node.js stateless, fast is safe
      policies:
        - type: Pods
          value: 2                       # was 1 — faster recovery
          periodSeconds: 60