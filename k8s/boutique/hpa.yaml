# boutique/hpa.yaml — Holy Grail Edition v5
# =============================================================================
# ROOT CAUSE ANALYSIS — WHY HPA NEVER FIRED AT 1000 VU:
#
# The v4 HPA was CPU%-based across all services. This was fundamentally wrong
# for this workload on Apple Silicon. Here's why:
#
# 1. GO SERVICES (frontend, checkout, shipping): Go's goroutine scheduler is
#    extremely CPU-efficient. At 800 req/s, frontend burns ~20-40m millicore
#    while queuing thousands of goroutines. CPU% HPA sees 40m/50m = 80% but
#    the 2-pod average stays flat — HPA never crosses the threshold because
#    the load distributes perfectly across 2 pods CPU-wise while goroutines
#    pile up in queues. The RIGHT signal is goroutine count or memory pressure
#    (goroutines allocate stack on heap — memory rises with queue depth).
#
# 2. DOCKER DESKTOP NAT THROTTLE (the throughput plateau):
#    ALL k6 → localhost:8080 traffic flows through Docker Desktop's userspace
#    NAT proxy (vpnkit). This proxy is single-threaded and saturates at ~60-70
#    req/s regardless of app capacity. This is WHY 100 VU and 1000 VU both show
#    the same throughput (~55-73 req/s). The app is not the bottleneck at all.
#    Fix: run k6 INSIDE the cluster as a Kubernetes Job (see k6-job.yaml).
#    This bypasses the NAT proxy entirely and uses kube-proxy in-cluster routing.
#
# 3. CURRENCY CPU LIMIT TOO LOW:
#    currencyservice limit was 100m. At 12 pods × 100m = 1200m max.
#    But currency is called on EVERY page render (fan-out). At 800 req/s
#    that's 800 RPC calls/s into currency pods. 100m limit was throttling
#    currency before HPA could respond. Raised to 300m.
#
# KEY CHANGES v5:
#
# [FIX 1 — Frontend HPA: CPU% → Memory-based PRIMARY signal]
#   Go goroutines allocate 8KB stack on heap by default. At high concurrency
#   memory rises proportionally with goroutine queue depth. Memory is the
#   correct proxy for "frontend is overwhelmed" in a Go service.
#   Memory trigger: 60% × 128Mi = 77Mi — fires when goroutine queues build.
#   CPU kept as secondary (safety net).
#   minReplicas: 2→3 — pre-warm, skip the cold-start scaling lag at demo start.
#
# [FIX 2 — Checkout HPA: minReplicas 3→4, scaleUp +3 pods/30s]
#   checkout is I/O-bound. 4 min replicas means 4 × 7 downstream calls = 28
#   concurrent gRPC goroutines capacity before queuing starts.
#   More aggressive scaleUp: +3 pods/30s vs +2/30s.
#
# [FIX 3 — Currency CPU limit: 100m → 300m]
#   Was artificially throttling currency at high fan-out. HPA was adding pods
#   but each pod was CPU-throttled, not CPU-saturated. Throttle ≠ utilization.
#   300m limit removes the CPU throttle. HPA trigger unchanged (60% × 50m = 30m).
#
# [FIX 4 — All HPAs: scaleUp stabilizationWindowSeconds 30→15]
#   30s window means HPA waits 30s of sustained above-threshold before acting.
#   At 1000 VU ramp, that's 30s of queuing before first pod added. Cut to 15s.
#   scaleDown stays at 300s — conservative is correct for scale-down.
#
# [FIX 5 — Currency HPA: minReplicas 3→4]
#   Called on every page render. 4 warm pods = better distribution for burst.
#
# NODE BUDGET v5:
#   frontend:      10 × 50m  =  500m  (min 3 replicas now)
#   productcat:     8 × 60m  =  480m
#   recommendation: 8 × 50m  =  400m
#   cart:           5 × 50m  =  250m
#   checkout:       8 × 100m =  800m  (min 4 replicas now)
#   currency:      12 × 50m  =  600m  (min 4 replicas, limit raised to 300m)
#   shipping:       6 × 50m  =  300m
#   payment:        6 × 50m  =  300m
#   fixed:                   ~  240m
#   Total boutique max:      ~3870m
#   Observability:           ~ 800m
#   kube-system:             ~ 400m
#   Grand total:             ~5070m / ~48000m M5 Pro = 10.6% — ample headroom ✓
# =============================================================================

# ── Frontend — Go proxy: MEMORY PRIMARY + CPU secondary ──────────────────────
#
# WHY MEMORY-BASED: Go goroutines are cheap CPU-wise but each allocates 8KB
# heap stack. Under high concurrency frontend spawns goroutines per request —
# memory rises proportionally with queue depth. This is the correct signal.
#
# Memory trigger: 60% × 128Mi = 77Mi → fires at real goroutine pressure
# CPU trigger:    50% × 50m   = 25m  → safety net for CPU-bound spikes
# minReplicas: 3 — 3 warm pods prevent cold-start lag on demo ramp
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 3          # was 2 — 3 pre-warmed pods, no HPA lag on demo start
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 60    # 60% × 128Mi = 77Mi — goroutine queue proxy
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50    # 50% × 50m = 25m — secondary safety net
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15    # was 30 — 15s faster response to ramp
      policies:
        - type: Pods
          value: 3
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── Product Catalog — CPU-heavy on browse ────────────────────────────────────
#
# CPU trigger: 50% × 60m = 30m actual — unchanged, was already correct.
# scaleUp window cut from 30s → 15s to match global fix.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: productcatalogservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: productcatalogservice
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50    # 50% × 60m = 30m actual trigger
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15    # was 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── Recommendation — Python, GIL-bound ───────────────────────────────────────
#
# Python GIL means threads can't parallelize CPU work. More pods = more
# parallel GIL-locked workers. Memory trigger added: Python accumulates
# request state in memory per worker — rises with load.
#
# CPU trigger:    55% × 50m   = 27m
# Memory trigger: 65% × 128Mi = 83Mi (secondary — Python heap grows with load)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: recommendationservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: recommendationservice
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 55    # 55% × 50m = 27m — Python GIL, pods are fix
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 65    # 65% × 128Mi = 83Mi — Python heap growth
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15    # was 45
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── Cart — .NET, JIT-aware conservative tuning ───────────────────────────────
#
# scaleUp stabilizationWindowSeconds STAYS at 60s.
# .NET JIT warmup spikes CPU to 800-1200m on pod start. 60s window averages
# through the spike before triggering another scale. This is intentional.
# Narrate: "conservative scale for stateful service with expensive cold start."
#
# CPU trigger: 60% × 50m = 30m actual — unchanged
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cartservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cartservice
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # 60% × 50m = 30m actual trigger
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60    # KEEP: .NET JIT spike averaging
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── Checkout — I/O-bound fan-out: minReplicas 3→4, faster scaleUp ────────────
#
# WHY MEMORY: checkout is I/O-bound — blocks on 7 downstream gRPC calls
# sequentially. CPU barely moves while goroutines pile up waiting on network.
# Memory rises with goroutine queue depth (8KB per goroutine stack).
#
# Memory trigger: 65% × 128Mi = 83Mi — goroutine queue depth proxy
# CPU trigger:    60% × 100m  = 60m  — secondary, fires on CPU-bound spikes
# minReplicas: 4 — 4 × 7 = 28 concurrent gRPC capacity before queuing
# scaleUp: +3 pods/30s — aggressive for a fan-out service
#
# ROADMAP: Replace with KEDA ScaledObject on in-flight request concurrency:
#   http_server_requests_in_flight{service="checkoutservice"} avg < 10 per pod
#   This is the senior SRE talking point for interviews.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: checkoutservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: checkoutservice
  minReplicas: 4          # was 3 → 4 warm pods, 28 concurrent gRPC capacity
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 65    # 65% × 128Mi = 83Mi — goroutine queue depth
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # 60% × 100m = 60m — secondary
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15    # was 30 — faster response to checkout burst
      policies:
        - type: Pods
          value: 3
          periodSeconds: 30         # was 2 pods — more aggressive for fan-out
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── Currency — every page render: minReplicas 3→4, limit 100m→300m ───────────
#
# CPU LIMIT FIX: currency limit was 100m. At fan-out scale (called on every
# page render), 12 pods × 100m limit = 1200m max. But at 800 req/s each pod
# handles ~67 req/s. CPU throttling was occurring at the cgroup level — pods
# were throttled, not saturated. HPA saw <60% utilization and didn't scale.
# Raising limit to 300m removes the throttle, lets pods actually use CPU,
# and HPA trigger becomes meaningful.
#
# CPU trigger: 60% × 50m = 30m — unchanged (request stays at 50m)
# minReplicas: 4 — 4 warm pods pre-distributed, better burst handling
#
# POST sync.Once cache fix: expect currency pod count to drop significantly.
# Reduce maxReplicas 12→6 after cache is validated at 5K VU.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: currencyservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: currencyservice
  minReplicas: 4          # was 3 — 4 pre-warmed, better burst distribution
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # 60% × 50m = 30m actual trigger
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15    # was 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── Shipping — Go service: memory added as secondary signal ───────────────────
#
# CPU trigger:    60% × 50m   = 30m
# Memory trigger: 65% × 64Mi  = 42Mi — secondary for goroutine burst
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shippingservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shippingservice
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # 60% × 50m = 30m actual
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 65    # 65% × 64Mi = 42Mi — goroutine proxy
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15    # was 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── Payment — Node.js service: unchanged profile ─────────────────────────────
#
# Node.js single-threaded event loop — CPU signal is correct here.
# No goroutine stack pressure, memory growth is less correlated with load.
# CPU trigger: 60% × 50m = 30m actual — unchanged from v4.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: paymentservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: paymentservice
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # 60% × 50m = 30m actual — correct for Node.js
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15    # was 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
