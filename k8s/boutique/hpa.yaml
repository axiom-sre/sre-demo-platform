# boutique/hpa.yaml — Holy Grail Edition v3
# =============================================================================
# KEY CHANGES vs v2:
#
# [CURRENCY maxReplicas: 6 → 10]
#   Root cause observed: at 250 VU, currency hit maxReplicas (6) within 5
#   minutes and pinned there. Every page render calls currency — home + each
#   product page. At 250 VU × ~3 currency calls/session = ~150 req/s on
#   currency. 6 pods cannot sustain this. 10 can.
#   10 × 15m = 150m requests scheduled — trivial node impact.
#
# [FRONTEND dual-metric HPA: CPU + memory]
#   Root cause observed: frontend CPU was 1m at idle and never exceeded
#   ~15m even at 250 VU. Go frontend proxies gRPC — it is not compute-bound.
#   The CPU trigger (25m) will never fire at realistic load.
#
#   Fix: add memory as primary HPA signal.
#   Memory grows linearly with VU count (goroutine stacks, HTTP buffers,
#   template render cache). Observed: 27-72Mi idle. Estimated 90-120Mi at
#   100 VU, 120-160Mi at 250 VU.
#   Trigger: 70% × 128Mi request = 90Mi actual → fires ~100-150 VU. ✓
#
#   HPA uses OR logic: fires when EITHER metric exceeds threshold.
#   CPU trigger kept as safety net for unexpected compute spikes.
#   Memory trigger is the primary scaling signal for frontend.
#
# [ALL think() times in load scripts tightened to 1-2s]
#   This is in the scripts, not here, but it matters for HPA:
#   Looser think times → lower RPS → lower CPU/memory → HPA never fires.
#   At think(1,2) avg 1.5s, 100 VU generates ~67 iterations/sec ≈ 100+ RPS.
#   That's enough to push all services past their triggers.
#
# NODE BUDGET — updated:
#   currency max: 10 × 15m  = 150m  (was 6 × 15m = 90m)
#   frontend max: 10 × 50m  = 500m  (unchanged)
#   Total boutique at max HPA: ~1355m requests
#   Available: ~6800m — still massive headroom.
# =============================================================================

# ── Frontend — Go proxy: dual-metric CPU + memory ────────────────────────────
#
# CPU trigger:    50% × 50m   = 25m   → safety net, unlikely to fire
# Memory trigger: 70% × 128Mi = 90Mi  → PRIMARY signal, fires ~100-150 VU
# HPA OR logic: whichever hits threshold first triggers scale.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70    # 70% × 128Mi = 90Mi — fires at real load
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 3
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── Product Catalog — CPU-heavy on browse ─────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: productcatalogservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: productcatalogservice
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50    # 50% × 30m = 15m actual trigger
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── Recommendation — Python, I/O bound ────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: recommendationservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: recommendationservice
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 55    # 55% × 25m = 14m. Python import spike avoidance.
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 45
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── Cart — .NET, conservatively tuned ─────────────────────────────────────────
#
# stabilizationWindowSeconds scaleUp: 60s — DO NOT REDUCE.
# .NET JIT warmup spikes CPU to 800-1200m on first requests per pod.
# 60s window averages through the spike before deciding to scale.
# Without this: JIT spike → HPA fires → new pod JIT spikes → cascade.
# The +1 pod/60s policy means cart scales visibly slowly — this is by design
# and should be narrated in demo as "conservative scale for stateful service".
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cartservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cartservice
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # 60% × 50m = 30m actual trigger
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── Checkout — low volume, CPU-heavy per request ──────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: checkoutservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: checkoutservice
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 55    # 55% × 25m = 14m actual trigger
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── Currency — every page render, maxReplicas bumped to 10 ────────────────────
#
# maxReplicas: 6 → 10
# Observed at 250 VU: pinned at maxReplicas (6) within 5 minutes.
# Currency is called on EVERY page render — not just checkout.
# At 1000 VU: ~1000+ currency calls/sec. 10 pods handles it.
# 10 × 15m = 150m scheduled requests — trivial scheduling overhead.
#
# In demo: currency maxing out and staying at 10 is a GOOD story —
# "currency is our hottest service, it scales to max and holds there
# because every single page render calls it". That's an SRE insight.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: currencyservice
  namespace: boutique
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: currencyservice
  minReplicas: 2
  maxReplicas: 10    # was 6 — pinned at 250 VU, needs headroom for 1000 VU
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # 60% × 15m = 9m actual — fires earliest
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
