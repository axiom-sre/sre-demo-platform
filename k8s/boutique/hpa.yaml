# ── paymentservice ────────────────────────────────────────────────────────────
# CRITICAL: 91.4% memory at 1000 VU — OOMKill risk confirmed 2026-04-24
# Root cause: limits.memory=128Mi vastly undersized for Node.js gRPC
# Fix 1 (this file): memory HPA trigger at 65% → scale out before OOMKill
# Fix 2 (boutique.yaml): raise limits to 256Mi, requests to 128Mi
# Memory trigger is the PRIMARY signal here — CPU stays low
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: paymentservice
  namespace: boutique
  labels:
    app: paymentservice
    hpa-version: v2
  annotations:
    sre/incident: "memory-saturation-2026-04-24"
    sre/fix: "raised memory limit 128Mi→256Mi, added memory HPA trigger"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: paymentservice
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 65
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      selectPolicy: Max
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120
      selectPolicy: Max
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
---
