# observability/grafana/grafana.yaml — Holy Grail Edition v3
# =============================================================================
# DASHBOARDS (5 total — world-class SRE demo quality):
#
#   1. SRE Command Center      (uid: command-center)
#      → Top-of-screen NOC view. RED metrics for all services at a glance.
#        Service health matrix, live RPS + error rate + p99 latency stat row,
#        active HPA replica counts, OOMKill & restart events, node pressure bar.
#        This is the "wow" dashboard for the opening of a demo.
#
#   2. Golden Signals Deep Dive (uid: golden-signals)
#      → Per-service drill-down. RPS, error rate, p90/p90/p95/p99 latency,
#        spanmetrics call volume heatmap, service dependency graph via Tempo
#        service map. Linked to traces for click-through on anomalies.
#
#   3. Platform & HPA          (uid: platform-stats)
#      → Pod CPU/memory/throttle/saturation, HPA live replica gauges,
#        HPA scaling history, pod restart counts, pending pod tracker,
#        ResourceQuota utilisation bars. The "is my cluster healthy" view.
#
#   4. SLO & Error Budget      (uid: slo-dashboard)
#      → 99.9% availability SLO, 30-day error budget burn rate (fast + slow
#        burn multi-window), p99 latency SLO compliance, error budget
#        remaining as a countdown bar. Suitable for executive audience.
#
#   5. Infrastructure & Node   (uid: infra-node)
#      → Node CPU/memory/disk/network from node-exporter, cAdvisor per-pod
#        network Rx/Tx, filesystem pressure, kubelet operation latency,
#        etcd heartbeat. The "how is the M5 Pro doing" view at 1000 VU.
#
# KEY DESIGN DECISIONS:
#   - All datasource UIDs are stable strings: prometheus / loki / tempo
#   - All dashboard UIDs are stable: survive pod restarts, PVC preserved
#   - graphTooltip: 1 (shared crosshair) on all dashboards
#   - refresh: 10s on command-center, 15s on others (spanmetrics cost)
#   - Exemplar support enabled on all Prometheus time-series panels
#   - Trace-to-log and metric-to-trace links wired on all panels
#   - Color thresholds are calibrated for 1000 VU steady state:
#       RPS red > 500 rps total / green < 200
#       Error rate yellow > 0.1% / red > 1%
#       p99 latency yellow > 500ms / red > 2s
#       CPU throttle yellow > 25% / red > 50%
#       Memory saturation yellow > 70% / red > 85%
# =============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: observability
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus.observability.svc.cluster.local:9090
        isDefault: true
        jsonData:
          timeInterval: "15s"
          httpMethod: POST
          exemplarTraceIdDestinations:
            - name: traceID
              datasourceUid: tempo
          incrementalQuerying: true
          incrementalQueryOverlapWindow: "10m"

      - name: Loki
        type: loki
        uid: loki
        url: http://loki.observability.svc.cluster.local:3100
        jsonData:
          maxLines: 2000
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: '"?traceID"?\s*[=:]\s*"?([a-f0-9]{16,32})"?'
              name: TraceID
              url: ''
            - datasourceUid: tempo
              matcherRegex: 'trace_id=([a-f0-9]{16,32})'
              name: TraceID
              url: ''

      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.observability.svc.cluster.local:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
            filterBySpanID: false
            customQuery: false
            tags:
              - key: service.name
                value: app
          tracesToMetrics:
            datasourceUid: prometheus
            tags:
              - key: service.name
                value: job
            queries:
              - name: "Request rate"
                query: "sum(rate(traces_spanmetrics_calls_total{$$__tags}[5m]))"
              - name: "Error rate"
                query: "sum(rate(traces_spanmetrics_calls_total{$$__tags,status_code=\"STATUS_CODE_ERROR\"}[5m]))"
              - name: "p99 latency"
                query: "histogram_quantile(0.99,sum(rate(traces_spanmetrics_latency_bucket{$$__tags}[5m]))by(le))"
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
          lokiSearch:
            datasourceUid: loki
          traceQuery:
            timeShiftEnabled: true
            spanStartTimeShift: "-2m"
            spanEndTimeShift: "2m"
          spanBar:
            type: Tag
            tag: http.route
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: observability
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        type: file
        # disableDeletion: true prevents the provisioner from removing dashboards
        # that exist on disk but not in the config — safe for PVC-backed storage.
        disableDeletion: false
        # updateIntervalSeconds: 0 disables the polling loop that overwrites
        # UI edits. Dashboards are loaded once at startup from the PVC directory.
        # This is the key fix: with ConfigMap mounts + polling, every 30s the
        # provisioner re-reads the ConfigMap and overwrites your UI saves.
        updateIntervalSeconds: 0
        allowUiUpdates: true
        editable: true
        options:
          # PVC-backed path: writable, persistent across pod restarts.
          # Init container seeds this on first boot from ConfigMap JSON.
          path: /var/lib/grafana/dashboards
---
# =============================================================================
# DASHBOARD 1: SRE Command Center
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-command-center
  namespace: observability
data:
  command-center.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": ["command-center", "noc", "overview"],
      "time": { "from": "now-15m", "to": "now" },
      "timepicker": {},
      "title": "SRE Command Center",
      "uid": "command-center",
      "version": 1,
      "panels": [

        {
          "id": 1,
          "type": "stat",
          "title": "🟢 Observability Pipeline Health",
          "description": "All signals must be green before a demo. Alloy → Prometheus → Tempo → Loki chain.",
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "unit": "short", "noValue": "NO DATA"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "name",
            "justifyMode": "center"
          },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "vector(1) and on() up{job=\"alloy\"}", "instant": true, "legendFormat": "Alloy", "refId": "A" },
            { "datasource": { "uid": "prometheus" }, "expr": "vector(1) and on() up{job=\"prometheus\"}", "instant": true, "legendFormat": "Prometheus", "refId": "B" },
            { "datasource": { "uid": "prometheus" }, "expr": "scalar(count(traces_spanmetrics_calls_total) > 0)", "instant": true, "legendFormat": "Spanmetrics Flowing", "refId": "C" },
            { "datasource": { "uid": "prometheus" }, "expr": "vector(1) and on() up{job=\"kube-state-metrics\"}", "instant": true, "legendFormat": "kube-state-metrics", "refId": "D" },
            { "datasource": { "uid": "prometheus" }, "expr": "scalar(count(kube_node_status_condition{condition=\"Ready\",status=\"true\"}) > 0)", "instant": true, "legendFormat": "Node Ready", "refId": "E" },
            { "datasource": { "uid": "prometheus" }, "expr": "scalar(count(container_memory_working_set_bytes{namespace=\"boutique\",container!=\"\",container!=\"POD\"}) > 0)", "instant": true, "legendFormat": "cAdvisor Scraping", "refId": "F" }
          ]
        },

        {
          "id": 10,
          "type": "stat",
          "title": "Total RPS (all services)",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1000 }, { "color": "red", "value": 5000 }] },
              "unit": "reqps", "decimals": 1
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "sum(rate(traces_spanmetrics_calls_total[2m]))", "legendFormat": "RPS", "refId": "A" }]
        },

        {
          "id": 11,
          "type": "stat",
          "title": "Global Error Rate",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.001 }, { "color": "red", "value": 0.01 }] },
              "unit": "percentunit", "decimals": 3, "noValue": "No traffic"
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "sum(rate(traces_spanmetrics_calls_total{status_code=\"STATUS_CODE_ERROR\"}[2m])) / sum(rate(traces_spanmetrics_calls_total[2m]))", "legendFormat": "Error Rate", "refId": "A" }]
        },

        {
          "id": 12,
          "type": "stat",
          "title": "Frontend p99 Latency",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.5 }, { "color": "red", "value": 2.0 }] },
              "unit": "s", "decimals": 3
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "histogram_quantile(0.99, sum by (le) (rate(traces_spanmetrics_latency_bucket{service=\"frontend\"}[2m])))", "legendFormat": "p99", "refId": "A" }]
        },

        {
          "id": 13,
          "type": "stat",
          "title": "Active Boutique Pods",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 8 }, { "color": "green", "value": 12 }] },
              "unit": "short"
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "count(kube_pod_status_phase{namespace=\"boutique\",phase=\"Running\"})", "legendFormat": "Running Pods", "refId": "A" }]
        },

        {
          "id": 14,
          "type": "stat",
          "title": "Node CPU Utilisation",
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.65 }, { "color": "red", "value": 0.85 }] },
              "unit": "percentunit", "decimals": 1
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[2m]))", "legendFormat": "CPU Used", "refId": "A" }]
        },

        {
          "id": 15,
          "type": "stat",
          "title": "Node Memory Utilisation",
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.70 }, { "color": "red", "value": 0.85 }] },
              "unit": "percentunit", "decimals": 1
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)", "legendFormat": "Mem Used", "refId": "A" }]
        },

        {
          "id": 20,
          "type": "timeseries",
          "title": "Live Request Rate by Service",
          "description": "Sum of spans per second from spanmetrics. Reveals traffic shape and HPA-driven scaling moments.",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "reqps"
            },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull", "max", "mean"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "sum by (service) (rate(traces_spanmetrics_calls_total[2m]))", "legendFormat": "{{service}}", "refId": "A" }]
        },

        {
          "id": 21,
          "type": "timeseries",
          "title": "Error Rate by Service (OTel STATUS_CODE_ERROR)",
          "description": "Percentage of spans with error status. Threshold lines at SLO boundary (0.1% yellow, 1% red).",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 5, "gradientMode": "none",
                "showPoints": "never", "spanNulls": true,
                "thresholdsStyle": { "mode": "dashed" }
              },
              "unit": "percentunit", "decimals": 2,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.001 }, { "color": "red", "value": 0.01 }] }
            },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "sum by (service) (rate(traces_spanmetrics_calls_total{status_code=\"STATUS_CODE_ERROR\"}[2m])) / sum by (service) (rate(traces_spanmetrics_calls_total[2m]))", "legendFormat": "{{service}}", "refId": "A" }
          ]
        },

        {
          "id": 30,
          "type": "timeseries",
          "title": "p90 / p95 / p99 Latency — Frontend",
          "description": "Latency percentiles for the frontend service. This is what the user experiences.",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 17 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 5, "showPoints": "never", "spanNulls": true },
              "unit": "s"
            },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull", "max", "mean"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "histogram_quantile(0.50, sum by (le) (rate(traces_spanmetrics_latency_bucket{service=\"frontend\"}[2m])))", "legendFormat": "p90", "refId": "A" },
            { "datasource": { "uid": "prometheus" }, "expr": "histogram_quantile(0.95, sum by (le) (rate(traces_spanmetrics_latency_bucket{service=\"frontend\"}[2m])))", "legendFormat": "p95", "refId": "B" },
            { "datasource": { "uid": "prometheus" }, "expr": "histogram_quantile(0.99, sum by (le) (rate(traces_spanmetrics_latency_bucket{service=\"frontend\"}[2m])))", "legendFormat": "p99", "refId": "C" }
          ]
        },

        {
          "id": 31,
          "type": "timeseries",
          "title": "HPA Replica Scaling — All Services",
          "description": "Current vs desired replicas for all HPA-managed deployments. Step changes = HPA scale event.",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 17 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "stepAfter", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": false },
              "unit": "short", "decimals": 0, "min": 0
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": "desired.*" },
                "properties": [{ "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [6, 3] } }, { "id": "custom.lineWidth", "value": 1 }]
              }
            ]
          },
          "options": {
            "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"boutique\"}", "legendFormat": "current — {{horizontalpodautoscaler}}", "refId": "A" },
            { "datasource": { "uid": "prometheus" }, "expr": "kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"boutique\"}", "legendFormat": "desired — {{horizontalpodautoscaler}}", "refId": "B" }
          ]
        },

        {
          "id": 40,
          "type": "gauge",
          "title": "HPA Current Replicas vs Max (% capacity used)",
          "description": "How close each service is to its HPA maxReplicas ceiling. Red = at max = scaling is blocked.",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 26 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "percentage", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 75 }, { "color": "red", "value": 95 }] },
              "unit": "short", "min": 0
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "frontend" }, "properties": [{ "id": "max", "value": 10 }, { "id": "min", "value": 2 }] },
              { "matcher": { "id": "byName", "options": "cartservice" }, "properties": [{ "id": "max", "value": 5 }, { "id": "min", "value": 2 }] },
              { "matcher": { "id": "byName", "options": "checkoutservice" }, "properties": [{ "id": "max", "value": 6 }, { "id": "min", "value": 2 }] },
              { "matcher": { "id": "byName", "options": "currencyservice" }, "properties": [{ "id": "max", "value": 6 }, { "id": "min", "value": 2 }] },
              { "matcher": { "id": "byName", "options": "productcatalogservice" }, "properties": [{ "id": "max", "value": 6 }, { "id": "min", "value": 2 }] },
              { "matcher": { "id": "byName", "options": "recommendationservice" }, "properties": [{ "id": "max", "value": 5 }, { "id": "min", "value": 2 }] }
            ]
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "showThresholdLabels": true, "showThresholdMarkers": true },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"boutique\"}", "instant": true, "legendFormat": "{{horizontalpodautoscaler}}", "refId": "A" }
          ]
        },

        {
          "id": 50,
          "type": "table",
          "title": "Service Health Matrix — Last 2 Minutes",
          "description": "Per-service snapshot: RPS, error rate, p99 latency, running pods. Click service to open traces.",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 34 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "center", "displayMode": "auto", "inspect": false
              },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Error Rate" }, "properties": [{ "id": "unit", "value": "percentunit" }, { "id": "decimals", "value": 3 }, { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.001 }, { "color": "red", "value": 0.01 }] } }, { "id": "custom.displayMode", "value": "color-background" }] },
              { "matcher": { "id": "byName", "options": "RPS" }, "properties": [{ "id": "unit", "value": "reqps" }, { "id": "decimals", "value": 1 }] },
              { "matcher": { "id": "byName", "options": "p99 Latency" }, "properties": [{ "id": "unit", "value": "s" }, { "id": "decimals", "value": 3 }, { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.5 }, { "color": "red", "value": 2.0 }] } }, { "id": "custom.displayMode", "value": "color-background" }] },
              { "matcher": { "id": "byName", "options": "Running Pods" }, "properties": [{ "id": "unit", "value": "short" }, { "id": "custom.displayMode", "value": "color-background" }, { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 1 }, { "color": "green", "value": 2 }] } }] }
            ]
          },
          "options": {
            "showHeader": true,
            "cellHeight": "sm",
            "footer": { "show": false, "reducer": ["sum"], "countRows": false, "fields": "" }
          },
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "renameByName": { "service": "Service", "Value #A": "RPS", "Value #B": "Error Rate", "Value #C": "p99 Latency", "Value #D": "Running Pods" }
              }
            }
          ],
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "sum by (service) (rate(traces_spanmetrics_calls_total[2m]))", "instant": true, "legendFormat": "{{service}}", "refId": "A", "format": "table" },
            { "datasource": { "uid": "prometheus" }, "expr": "sum by (service) (rate(traces_spanmetrics_calls_total{status_code=\"STATUS_CODE_ERROR\"}[2m])) / sum by (service) (rate(traces_spanmetrics_calls_total[2m]))", "instant": true, "legendFormat": "{{service}}", "refId": "B", "format": "table" },
            { "datasource": { "uid": "prometheus" }, "expr": "histogram_quantile(0.99, sum by (le, service) (rate(traces_spanmetrics_latency_bucket[2m])))", "instant": true, "legendFormat": "{{service}}", "refId": "C", "format": "table" },
            { "datasource": { "uid": "prometheus" }, "expr": "count by (pod) (kube_pod_status_phase{namespace=\"boutique\",phase=\"Running\"}) * on(pod) group_left(label_app) kube_pod_labels{namespace=\"boutique\"}", "instant": true, "legendFormat": "{{label_app}}", "refId": "D", "format": "table" }
          ]
        },

        {
          "id": 60,
          "type": "logs",
          "title": "Live Error Logs — boutique namespace",
          "description": "Streaming error logs from all boutique pods. Filter by pod or container using the Loki label selectors.",
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 44 },
          "datasource": { "type": "loki", "uid": "loki" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "options": {
            "dedupStrategy": "none",
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false,
            "prettifyLogMessage": false,
            "enableLogDetails": true
          },
          "targets": [
            { "datasource": { "uid": "loki" }, "expr": "{namespace=\"boutique\"} |~ \"(?i)(error|exception|fatal|panic|FAIL|timeout|refused|OOM)\"", "legendFormat": "", "refId": "A" }
          ]
        }
      ]
    }
