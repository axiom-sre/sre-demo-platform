# =============================================================================
# DASHBOARD 3: Platform & HPA
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-platform
  namespace: observability
data:
  platform-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "refresh": "15s",
      "schemaVersion": 39,
      "tags": ["boutique", "platform", "hpa", "resources"],
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {},
      "title": "Platform & HPA",
      "uid": "platform-stats",
      "version": 3,
      "panels": [

        {
          "id": 1,
          "type": "timeseries",
          "title": "Pod CPU Usage (millicores) — boutique",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": false },
              "unit": "short"
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max", "mean"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"boutique\",container!=\"\",container!=\"POD\"}[2m])) * 1000", "legendFormat": "{{pod}}", "refId": "A" }]
        },

        {
          "id": 2,
          "type": "timeseries",
          "title": "Pod Memory Working Set — boutique",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": false },
              "unit": "bytes"
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"boutique\",container!=\"\",container!=\"POD\"})", "legendFormat": "{{pod}}", "refId": "A" }]
        },

        {
          "id": 10,
          "type": "timeseries",
          "title": "CPU Throttle Rate — boutique (red = hitting CPU limit)",
          "description": "% of CPU scheduling periods being throttled. >25% = container hitting limit = requests queuing.",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 9 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": false, "thresholdsStyle": { "mode": "dashed+area" } },
              "unit": "percentunit",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.25 }, { "color": "red", "value": 0.5 }] }
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "sum by (pod) (\n  rate(container_cpu_cfs_throttled_seconds_total{namespace=\"boutique\",container!=\"\",container!=\"POD\"}[2m])\n) / sum by (pod) (\n  rate(container_cpu_cfs_periods_total{namespace=\"boutique\",container!=\"\",container!=\"POD\"}[2m])\n)", "legendFormat": "{{pod}}", "refId": "A" }
          ]
        },

        {
          "id": 11,
          "type": "timeseries",
          "title": "Memory Saturation % of Limit — boutique (red = OOMKill risk)",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 9 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": false, "thresholdsStyle": { "mode": "dashed+area" } },
              "unit": "percentunit", "min": 0, "max": 1,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.70 }, { "color": "red", "value": 0.85 }] }
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"boutique\",container!=\"\",container!=\"POD\"}) / sum by (pod) (kube_pod_container_resource_limits{namespace=\"boutique\",resource=\"memory\"})", "legendFormat": "{{pod}}", "refId": "A" }
          ]
        },

        {
          "id": 20,
          "type": "gauge",
          "title": "HPA Live Replicas",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 18 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "percentage", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 75 }, { "color": "red", "value": 95 }] },
              "unit": "short", "min": 0
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "frontend" }, "properties": [{ "id": "max", "value": 10 }, { "id": "min", "value": 2 }] },
              { "matcher": { "id": "byName", "options": "cartservice" }, "properties": [{ "id": "max", "value": 5 }, { "id": "min", "value": 2 }] },
              { "matcher": { "id": "byName", "options": "checkoutservice" }, "properties": [{ "id": "max", "value": 6 }, { "id": "min", "value": 2 }] },
              { "matcher": { "id": "byName", "options": "currencyservice" }, "properties": [{ "id": "max", "value": 6 }, { "id": "min", "value": 2 }] },
              { "matcher": { "id": "byName", "options": "productcatalogservice" }, "properties": [{ "id": "max", "value": 6 }, { "id": "min", "value": 2 }] },
              { "matcher": { "id": "byName", "options": "recommendationservice" }, "properties": [{ "id": "max", "value": 5 }, { "id": "min", "value": 2 }] }
            ]
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "showThresholdLabels": true, "showThresholdMarkers": true },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"boutique\"}", "instant": true, "legendFormat": "{{horizontalpodautoscaler}}", "refId": "A" }]
        },

        {
          "id": 21,
          "type": "timeseries",
          "title": "HPA Scaling History — current vs desired replicas",
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 26 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "stepAfter", "lineWidth": 2, "fillOpacity": 10, "showPoints": "never", "spanNulls": false },
              "unit": "short", "decimals": 0, "min": 0
            },
            "overrides": [
              { "matcher": { "id": "byRegexp", "options": "desired.*" }, "properties": [{ "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [6, 3] } }, { "id": "custom.lineWidth", "value": 1 }] }
            ]
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"boutique\"}", "legendFormat": "current — {{horizontalpodautoscaler}}", "refId": "A" },
            { "datasource": { "uid": "prometheus" }, "expr": "kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"boutique\"}", "legendFormat": "desired — {{horizontalpodautoscaler}}", "refId": "B" }
          ]
        },

        {
          "id": 22,
          "type": "timeseries",
          "title": "HPA CPU Utilisation vs Target — per service",
          "description": "The metric the HPA controller uses to decide when to scale. Crosses target = scale event fires.",
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 35 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 5, "showPoints": "never", "spanNulls": true },
              "unit": "percentunit", "min": 0
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "kube_horizontalpodautoscaler_status_current_metrics_average_utilization{namespace=\"boutique\"} / 100", "legendFormat": "current — {{horizontalpodautoscaler}}", "refId": "A" },
            { "datasource": { "uid": "prometheus" }, "expr": "kube_horizontalpodautoscaler_spec_target_metric{namespace=\"boutique\",metric_target_type=\"Utilization\"} / 100", "legendFormat": "target — {{horizontalpodautoscaler}}", "refId": "B" }
          ]
        },

        {
          "id": 30,
          "type": "stat",
          "title": "Pod Restart Counts — boutique",
          "gridPos": { "h": 5, "w": 24, "x": 0, "y": 44 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 3 }] },
              "mappings": [{ "type": "value", "options": { "0": { "text": "0", "color": "green" } } }],
              "unit": "short", "decimals": 0
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none", "textMode": "value_and_name", "justifyMode": "center", "orientation": "horizontal" },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "sum by (pod) (kube_pod_container_status_restarts_total{namespace=\"boutique\"})", "instant": true, "legendFormat": "{{pod}}", "refId": "A" }
          ]
        },

        {
          "id": 40,
          "type": "timeseries",
          "title": "Pending Pods — boutique (scheduling pressure indicator)",
          "description": "Any Pending pod means the scheduler can't place it. Sustained >0 = node is resource-saturated.",
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 49 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "red" },
              "custom": { "drawStyle": "line", "lineInterpolation": "stepAfter", "lineWidth": 2, "fillOpacity": 30, "showPoints": "never", "spanNulls": false },
              "unit": "short", "min": 0
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "single", "sort": "none" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "count(kube_pod_status_phase{namespace=\"boutique\",phase=\"Pending\"}) or vector(0)", "legendFormat": "Pending pods", "refId": "A" }
          ]
        },

        {
          "id": 41,
          "type": "timeseries",
          "title": "boutique ResourceQuota Utilisation",
          "description": "CPU and memory quota consumed vs hard limits. Approaching 100% = HPA scale-out will be blocked.",
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 49 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": false, "thresholdsStyle": { "mode": "dashed" } },
              "unit": "percentunit", "min": 0, "max": 1,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.75 }, { "color": "red", "value": 0.90 }] }
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "kube_resourcequota{namespace=\"boutique\",type=\"used\",resource=\"requests.cpu\"} / kube_resourcequota{namespace=\"boutique\",type=\"hard\",resource=\"requests.cpu\"}", "legendFormat": "CPU requests", "refId": "A" },
            { "datasource": { "uid": "prometheus" }, "expr": "kube_resourcequota{namespace=\"boutique\",type=\"used\",resource=\"requests.memory\"} / kube_resourcequota{namespace=\"boutique\",type=\"hard\",resource=\"requests.memory\"}", "legendFormat": "Memory requests", "refId": "B" },
            { "datasource": { "uid": "prometheus" }, "expr": "kube_resourcequota{namespace=\"boutique\",type=\"used\",resource=\"pods\"} / kube_resourcequota{namespace=\"boutique\",type=\"hard\",resource=\"pods\"}", "legendFormat": "Pod count", "refId": "C" }
          ]
        }
      ]
    }
---
# =============================================================================
# DASHBOARD 4: SLO & Error Budget
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-slo
  namespace: observability
data:
  slo-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "refresh": "15s",
      "schemaVersion": 39,
      "tags": ["boutique", "slo", "error-budget"],
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "title": "SLO & Error Budget",
      "uid": "slo-dashboard",
      "version": 2,
      "panels": [

        {
          "id": 1,
          "type": "stat",
          "title": "Availability (last 1h) — SLO: 99.9%",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 0.99 }, { "color": "green", "value": 0.999 }] },
              "unit": "percentunit", "decimals": 3, "noValue": "No traffic"
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none", "textMode": "auto" },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "1 - (sum(rate(traces_spanmetrics_calls_total{status_code=\"STATUS_CODE_ERROR\"}[1h])) / sum(rate(traces_spanmetrics_calls_total[1h])))", "legendFormat": "Availability", "refId": "A" }
          ]
        },

        {
          "id": 2,
          "type": "stat",
          "title": "Error Budget Remaining (30d rolling)",
          "description": "Minutes of allowed downtime at 99.9% SLO = 43.8 min/month. Shows how much is left.",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 0.20 }, { "color": "green", "value": 0.50 }] },
              "unit": "percentunit", "decimals": 2, "noValue": "No traffic"
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none", "textMode": "auto" },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "1 - (sum(rate(traces_spanmetrics_calls_total{status_code=\"STATUS_CODE_ERROR\"}[30d])) / sum(rate(traces_spanmetrics_calls_total[30d])) / (1 - 0.999))", "legendFormat": "Budget remaining", "refId": "A" }
          ]
        },

        {
          "id": 3,
          "type": "stat",
          "title": "Current Error Rate (5m)",
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.001 }, { "color": "red", "value": 0.01 }] },
              "unit": "percentunit", "decimals": 2, "noValue": "No traffic"
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "sum(rate(traces_spanmetrics_calls_total{status_code=\"STATUS_CODE_ERROR\"}[5m])) / sum(rate(traces_spanmetrics_calls_total[5m]))", "legendFormat": "Error Rate", "refId": "A" }
          ]
        },

        {
          "id": 4,
          "type": "stat",
          "title": "Fast Burn Rate (5m window)",
          "description": ">1x = burning budget. >3x = alert-worthy. >14.4x = exhausts 30d budget in 2h.",
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "orange", "value": 3 }, { "color": "red", "value": 14.4 }] },
              "unit": "short", "decimals": 2, "noValue": "No traffic"
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "(sum(rate(traces_spanmetrics_calls_total{status_code=\"STATUS_CODE_ERROR\"}[5m])) / sum(rate(traces_spanmetrics_calls_total[5m]))) / 0.001", "legendFormat": "Burn rate", "refId": "A" }
          ]
        },

        {
          "id": 10,
          "type": "timeseries",
          "title": "Error Rate vs SLO Target (99.9% = 0.1% error budget)",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": true,
                "thresholdsStyle": { "mode": "dashed" }
              },
              "unit": "percentunit", "decimals": 2,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.001 }, { "color": "red", "value": 0.01 }] }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "SLO target (99.9%)" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }, { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [8, 4] } }, { "id": "custom.lineWidth", "value": 1 }] }
            ]
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max", "mean"], "displayMode": "table", "placement": "right", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "sum(rate(traces_spanmetrics_calls_total{status_code=\"STATUS_CODE_ERROR\"}[1h])) / sum(rate(traces_spanmetrics_calls_total[1h]))", "legendFormat": "1h error rate", "refId": "A" },
            { "datasource": { "uid": "prometheus" }, "expr": "sum(rate(traces_spanmetrics_calls_total{status_code=\"STATUS_CODE_ERROR\"}[5m])) / sum(rate(traces_spanmetrics_calls_total[5m]))", "legendFormat": "5m error rate", "refId": "B" },
            { "datasource": { "uid": "prometheus" }, "expr": "vector(0.001)", "legendFormat": "SLO target (99.9%)", "refId": "C" }
          ]
        },

        {
          "id": 11,
          "type": "timeseries",
          "title": "Error Budget Burn Rate (multi-window)",
          "description": "Multi-window burn rate detection. 5m + 1h burn rate both >3x = page immediately. Single window >14.4x = critical.",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 15 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 5, "showPoints": "never", "spanNulls": true,
                "thresholdsStyle": { "mode": "dashed" }
              },
              "unit": "short", "decimals": 2,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "orange", "value": 3 }, { "color": "red", "value": 14.4 }] }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Budget neutral (1x)" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }, { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [8, 4] } }, { "id": "custom.lineWidth", "value": 1 }] },
              { "matcher": { "id": "byName", "options": "Fast burn alert (3x)" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "orange" } }, { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [8, 4] } }, { "id": "custom.lineWidth", "value": 1 }] }
            ]
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "right", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "(sum(rate(traces_spanmetrics_calls_total{status_code=\"STATUS_CODE_ERROR\"}[5m])) / sum(rate(traces_spanmetrics_calls_total[5m]))) / 0.001", "legendFormat": "5m burn rate", "refId": "A" },
            { "datasource": { "uid": "prometheus" }, "expr": "(sum(rate(traces_spanmetrics_calls_total{status_code=\"STATUS_CODE_ERROR\"}[1h])) / sum(rate(traces_spanmetrics_calls_total[1h]))) / 0.001", "legendFormat": "1h burn rate", "refId": "B" },
            { "datasource": { "uid": "prometheus" }, "expr": "vector(1)", "legendFormat": "Budget neutral (1x)", "refId": "C" },
            { "datasource": { "uid": "prometheus" }, "expr": "vector(3)", "legendFormat": "Fast burn alert (3x)", "refId": "D" }
          ]
        },

        {
          "id": 20,
          "type": "timeseries",
          "title": "Latency SLO Compliance — p99 < 2s target",
          "description": "p99 latency for each service vs the 2s SLO target line. Breaches here directly affect end-user experience.",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 25 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 5, "showPoints": "never", "spanNulls": true,
                "thresholdsStyle": { "mode": "dashed" }
              },
              "unit": "s",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.5 }, { "color": "red", "value": 2.0 }] }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "p99 SLO target (2s)" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }, { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [8, 4] } }, { "id": "custom.lineWidth", "value": 1 }] }
            ]
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max", "mean"], "displayMode": "table", "placement": "right", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "histogram_quantile(0.99, sum by (le, service) (rate(traces_spanmetrics_latency_bucket[5m])))", "legendFormat": "p99 {{service}}", "refId": "A" },
            { "datasource": { "uid": "prometheus" }, "expr": "histogram_quantile(0.95, sum by (le, service) (rate(traces_spanmetrics_latency_bucket[5m])))", "legendFormat": "p95 {{service}}", "refId": "B" },
            { "datasource": { "uid": "prometheus" }, "expr": "vector(2.0)", "legendFormat": "p99 SLO target (2s)", "refId": "C" }
          ]
        }
      ]
    }
---
# =============================================================================
# DASHBOARD 5: Infrastructure & Node
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-infra-node
  namespace: observability
data:
  infra-node.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "refresh": "15s",
      "schemaVersion": 39,
      "tags": ["infrastructure", "node", "m5pro", "resources"],
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {},
      "title": "Infrastructure & Node",
      "uid": "infra-node",
      "version": 1,
      "panels": [

        {
          "id": 1,
          "type": "stat",
          "title": "Node CPU",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.65 }, { "color": "red", "value": 0.85 }] },
              "unit": "percentunit", "decimals": 1
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[2m]))", "legendFormat": "CPU", "refId": "A" }]
        },

        {
          "id": 2,
          "type": "stat",
          "title": "Node Memory",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.70 }, { "color": "red", "value": 0.85 }] },
              "unit": "percentunit", "decimals": 1
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)", "legendFormat": "Memory", "refId": "A" }]
        },

        {
          "id": 3,
          "type": "stat",
          "title": "Total Memory",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "unit": "bytes"
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "none", "graphMode": "none", "textMode": "auto" },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "node_memory_MemTotal_bytes", "legendFormat": "Total RAM", "refId": "A" }]
        },

        {
          "id": 4,
          "type": "stat",
          "title": "Available Memory",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 4000000000 }, { "color": "green", "value": 16000000000 }] },
              "unit": "bytes"
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "node_memory_MemAvailable_bytes", "legendFormat": "Available", "refId": "A" }]
        },

        {
          "id": 5,
          "type": "stat",
          "title": "Disk Used (root)",
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.7 }, { "color": "red", "value": 0.85 }] },
              "unit": "percentunit", "decimals": 1
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "1 - (node_filesystem_avail_bytes{mountpoint=\"/\",fstype!~\"tmpfs|overlay\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!~\"tmpfs|overlay\"})", "legendFormat": "Disk Used", "refId": "A" }]
        },

        {
          "id": 6,
          "type": "stat",
          "title": "Load Average (1m)",
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 8 }, { "color": "red", "value": 14 }] },
              "unit": "short", "decimals": 2
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "node_load1", "legendFormat": "Load 1m", "refId": "A" }]
        },

        {
          "id": 10,
          "type": "timeseries",
          "title": "CPU Usage by Mode",
          "description": "Breakdown of how the M5 Pro's CPU time is being spent. iowait spike = storage pressure. steal = VM contention.",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 10, "showPoints": "never", "spanNulls": true, "stacking": { "mode": "normal", "group": "A" } },
              "unit": "percentunit"
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "idle" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }, { "id": "custom.fillOpacity", "value": 3 }] },
              { "matcher": { "id": "byName", "options": "iowait" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "orange" } }] },
              { "matcher": { "id": "byName", "options": "steal" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }] }
            ]
          },
          "options": { "legend": { "calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "avg by (mode) (rate(node_cpu_seconds_total[2m]))", "legendFormat": "{{mode}}", "refId": "A" }
          ]
        },

        {
          "id": 11,
          "type": "timeseries",
          "title": "Memory Breakdown",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": true },
              "unit": "bytes"
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "node_memory_MemTotal_bytes - node_memory_MemFree_bytes - node_memory_Buffers_bytes - node_memory_Cached_bytes", "legendFormat": "Used (excl. cache)", "refId": "A" },
            { "datasource": { "uid": "prometheus" }, "expr": "node_memory_Cached_bytes + node_memory_Buffers_bytes", "legendFormat": "Cache + Buffers", "refId": "B" },
            { "datasource": { "uid": "prometheus" }, "expr": "node_memory_MemAvailable_bytes", "legendFormat": "Available", "refId": "C" }
          ]
        },

        {
          "id": 20,
          "type": "timeseries",
          "title": "Network I/O — Total",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": true },
              "unit": "Bps"
            },
            "overrides": [
              { "matcher": { "id": "byRegexp", "options": "TX.*" }, "properties": [{ "id": "custom.transform", "value": "negative-Y" }] }
            ]
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "sum(rate(node_network_receive_bytes_total{device!~\"lo|veth.*|docker.*|flannel.*|cbr.*|cni.*|br.*\"}[2m]))", "legendFormat": "RX (ingress)", "refId": "A" },
            { "datasource": { "uid": "prometheus" }, "expr": "sum(rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|docker.*|flannel.*|cbr.*|cni.*|br.*\"}[2m]))", "legendFormat": "TX (egress)", "refId": "B" }
          ]
        },

        {
          "id": 21,
          "type": "timeseries",
          "title": "Pod Network I/O — boutique (top pods by traffic)",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 5, "showPoints": "never", "spanNulls": true },
              "unit": "Bps"
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "topk(8, sum by (pod) (rate(container_network_receive_bytes_total{namespace=\"boutique\"}[2m])))", "legendFormat": "RX {{pod}}", "refId": "A" },
            { "datasource": { "uid": "prometheus" }, "expr": "topk(8, sum by (pod) (rate(container_network_transmit_bytes_total{namespace=\"boutique\"}[2m])))", "legendFormat": "TX {{pod}}", "refId": "B" }
          ]
        },

        {
          "id": 30,
          "type": "timeseries",
          "title": "Disk I/O — Read/Write Bytes",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 22 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": true },
              "unit": "Bps"
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "sum(rate(node_disk_read_bytes_total[2m]))", "legendFormat": "Read", "refId": "A" },
            { "datasource": { "uid": "prometheus" }, "expr": "sum(rate(node_disk_written_bytes_total[2m]))", "legendFormat": "Write", "refId": "B" }
          ]
        },

        {
          "id": 31,
          "type": "timeseries",
          "title": "Observability Stack — CPU Usage (millicores)",
          "description": "CPU consumed by the LGTM stack itself. Alloy spike during heavy trace load = expected. Prometheus spike during compaction = expected.",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 22 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": false },
              "unit": "short"
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"observability\",container!=\"\",container!=\"POD\"}[2m])) * 1000", "legendFormat": "{{pod}}", "refId": "A" }
          ]
        },

        {
          "id": 40,
          "type": "timeseries",
          "title": "Observability Stack — Memory Usage",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 31 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": false },
              "unit": "bytes"
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"observability\",container!=\"\",container!=\"POD\"})", "legendFormat": "{{pod}}", "refId": "A" }
          ]
        },

        {
          "id": 41,
          "type": "timeseries",
          "title": "Prometheus — Scrape Duration (p99 by job)",
          "description": "Slow scrapes mean gaps in metrics. >10s = likely timing out and data loss. Should be <2s for all jobs.",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 31 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 5, "showPoints": "never", "spanNulls": true, "thresholdsStyle": { "mode": "dashed" } },
              "unit": "s",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 5 }, { "color": "red", "value": 10 }] }
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "histogram_quantile(0.99, sum by (le, job) (rate(scrape_duration_seconds_bucket[5m])))", "legendFormat": "p99 {{job}}", "refId": "A" }
          ]
        },

        {
          "id": 50,
          "type": "timeseries",
          "title": "Prometheus TSDB — Active Series & WAL Size",
          "description": "Active series at 1000 VU with spanmetrics: expect 40-70k series. WAL size spikes during compaction.",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 40 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": true },
              "unit": "short"
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "WAL size" }, "properties": [{ "id": "unit", "value": "bytes" }, { "id": "custom.axisPlacement", "value": "right" }] }
            ]
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "prometheus_tsdb_head_series", "legendFormat": "Active series", "refId": "A" },
            { "datasource": { "uid": "prometheus" }, "expr": "prometheus_tsdb_wal_storage_size_bytes", "legendFormat": "WAL size", "refId": "B" },
            { "datasource": { "uid": "prometheus" }, "expr": "rate(prometheus_tsdb_head_samples_appended_total[2m])", "legendFormat": "Samples/sec ingested", "refId": "C" }
          ]
        },

        {
          "id": 51,
          "type": "timeseries",
          "title": "Tempo — Traces Received & Ingested",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 40 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": true },
              "unit": "short"
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "rate(tempo_distributor_spans_received_total[2m])", "legendFormat": "spans received/sec", "refId": "A" },
            { "datasource": { "uid": "prometheus" }, "expr": "rate(tempo_ingester_traces_created_total[2m])", "legendFormat": "traces created/sec", "refId": "B" },
            { "datasource": { "uid": "prometheus" }, "expr": "tempo_ingester_live_traces", "legendFormat": "live traces in ingester", "refId": "C" }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      priorityClassName: observability-high
      securityContext:
        fsGroup: 472
        runAsUser: 472
      initContainers:
        - name: dashboard-seeder
          image: alpine:3.19
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          command:
            - sh
            - -c
            - |
              mkdir -p /grafana-data/dashboards
              for f in /dashboard-seeds/*.json; do
                fname=$(basename "$f")
                dest="/grafana-data/dashboards/$fname"
                if [ ! -f "$dest" ]; then
                  echo "Seeding: $fname"
                  cp "$f" "$dest"
                else
                  echo "Exists (keeping your edits): $fname"
                fi
              done
              echo "Dashboard seeding complete."
          volumeMounts:
            - name: data
              mountPath: /grafana-data
            - name: dashboard-command-center
              mountPath: /dashboard-seeds/command-center.json
              subPath: command-center.json
            - name: dashboard-golden-signals
              mountPath: /dashboard-seeds/golden-signals.json
              subPath: golden-signals.json
            - name: dashboard-platform
              mountPath: /dashboard-seeds/platform-dashboard.json
              subPath: platform-dashboard.json
            - name: dashboard-slo
              mountPath: /dashboard-seeds/slo-dashboard.json
              subPath: slo-dashboard.json
            - name: dashboard-infra-node
              mountPath: /dashboard-seeds/infra-node.json
              subPath: infra-node.json
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_FEATURE_TOGGLES_ENABLE
              value: "traceToMetrics traceToLogs"
            # SQLite WAL mode: allows concurrent reads during dashboard saves
            - name: GF_DATABASE_WAL
              value: "true"
            - name: GF_DASHBOARDS_MIN_REFRESH_INTERVAL
              value: "10s"
            # 90s proxy timeout: spanmetrics range queries at 1000 VU can take 15-20s
            - name: GF_DATAPROXY_TIMEOUT
              value: "90"
            - name: GF_DATAPROXY_DIAL_TIMEOUT
              value: "10"
            # 200 idle connections: covers 5 datasources × multiple dashboard panels × 10s refresh
            - name: GF_DATAPROXY_MAX_IDLE_CONNECTIONS
              value: "200"
            # Keep connections alive across 10s dashboard refresh cycles
            - name: GF_DATAPROXY_KEEP_ALIVE_SECONDS
              value: "30"
            - name: GF_CHECK_FOR_UPDATES
              value: "false"
            - name: GF_CHECK_FOR_PLUGIN_UPDATES
              value: "false"
            # Prevent OOM during heavy dashboard sessions
            - name: GF_RENDERING_CONCURRENT_RENDER_LIMIT
              value: "4"
            # Home dashboard → Command Center
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: "/var/lib/grafana/dashboards/command-center.json"
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            # No ConfigMap JSON mounts here — dashboards live on the PVC.
            # The init container seeds /var/lib/grafana/dashboards/ on first boot.
            # UI edits are saved to Grafana's SQLite DB and to the PVC directory,
            # and survive pod restarts, suspend/resume, and Docker Desktop reboots.
          resources:
            requests:
              cpu: 300m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboard-command-center
          configMap:
            name: grafana-dashboard-command-center
        - name: dashboard-golden-signals
          configMap:
            name: grafana-dashboard-golden-signals
        - name: dashboard-platform
          configMap:
            name: grafana-dashboard-platform
        - name: dashboard-slo
          configMap:
            name: grafana-dashboard-slo
        - name: dashboard-infra-node
          configMap:
            name: grafana-dashboard-infra-node
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  type: LoadBalancer
  ports:
    - port: 3000
      targetPort: 3000
      # LoadBalancer on Docker Desktop → localhost:3000 automatically
