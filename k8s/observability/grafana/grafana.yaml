# =============================================================================
# DASHBOARD 2: Golden Signals Deep Dive
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-golden-signals
  namespace: observability
data:
  golden-signals.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "refresh": "15s",
      "schemaVersion": 39,
      "tags": ["boutique", "golden-signals", "red"],
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {},
      "title": "Golden Signals — Deep Dive",
      "uid": "golden-signals",
      "version": 2,
      "panels": [

        {
          "id": 1,
          "type": "timeseries",
          "title": "Request Rate (RPS) — All Services",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "reqps"
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max", "mean"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "sum by (service) (rate(traces_spanmetrics_calls_total[5m]))", "legendFormat": "{{service}}", "refId": "A" }]
        },

        {
          "id": 2,
          "type": "timeseries",
          "title": "Error Rate — All Services",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 5, "showPoints": "never", "spanNulls": true,
                "thresholdsStyle": { "mode": "dashed+area" }
              },
              "unit": "percentunit", "decimals": 2,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.001 }, { "color": "red", "value": 0.01 }] }
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "sum by (service) (rate(traces_spanmetrics_calls_total{status_code=\"STATUS_CODE_ERROR\"}[5m])) / sum by (service) (rate(traces_spanmetrics_calls_total[5m]))", "legendFormat": "{{service}}", "refId": "A" }]
        },

        {
          "id": 3,
          "type": "timeseries",
          "title": "p90 Latency by Service",
          "gridPos": { "h": 9, "w": 8, "x": 0, "y": 9 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 5, "showPoints": "never", "spanNulls": true }, "unit": "s" },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "histogram_quantile(0.90, sum by (le, service) (rate(traces_spanmetrics_latency_bucket[5m])))", "legendFormat": "p90 {{service}}", "refId": "A" }]
        },

        {
          "id": 4,
          "type": "timeseries",
          "title": "p95 Latency by Service",
          "gridPos": { "h": 9, "w": 8, "x": 8, "y": 9 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 5, "showPoints": "never", "spanNulls": true },
              "unit": "s",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.5 }, { "color": "red", "value": 1.5 }] }
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "histogram_quantile(0.95, sum by (le, service) (rate(traces_spanmetrics_latency_bucket[5m])))", "legendFormat": "p95 {{service}}", "refId": "A" }]
        },

        {
          "id": 5,
          "type": "timeseries",
          "title": "p99 Latency by Service",
          "gridPos": { "h": 9, "w": 8, "x": 16, "y": 9 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 5, "showPoints": "never", "spanNulls": true,
                "thresholdsStyle": { "mode": "dashed+area" }
              },
              "unit": "s",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.8 }, { "color": "red", "value": 2.0 }] }
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [{ "datasource": { "uid": "prometheus" }, "expr": "histogram_quantile(0.99, sum by (le, service) (rate(traces_spanmetrics_latency_bucket[5m])))", "legendFormat": "p99 {{service}}", "refId": "A" }]
        },

        {
          "id": 6,
          "type": "timeseries",
          "title": "Saturation — CPU Throttle Rate (% of CPU limit being throttled)",
          "description": ">25% means goroutines are queue-waiting on CPU. This is what caused cartservice failures at 1000 VU.",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 18 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": false,
                "thresholdsStyle": { "mode": "dashed+area" }
              },
              "unit": "percentunit",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.25 }, { "color": "red", "value": 0.5 }] }
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "sum by (pod) (\n  rate(container_cpu_cfs_throttled_seconds_total{namespace=\"boutique\",container!=\"\",container!=\"POD\"}[2m])\n) / sum by (pod) (\n  rate(container_cpu_cfs_periods_total{namespace=\"boutique\",container!=\"\",container!=\"POD\"}[2m])\n)", "legendFormat": "{{pod}}", "refId": "A" }
          ]
        },

        {
          "id": 7,
          "type": "timeseries",
          "title": "Saturation — Memory Usage % of Limit",
          "description": ">85% → OOMKill risk. OOMKill increments pod restarts and is the silent killer at 1000 VU.",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 18 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": false,
                "thresholdsStyle": { "mode": "dashed+area" }
              },
              "unit": "percentunit", "min": 0, "max": 1,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.70 }, { "color": "red", "value": 0.85 }] }
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"boutique\",container!=\"\",container!=\"POD\"}) / sum by (pod) (kube_pod_container_resource_limits{namespace=\"boutique\",resource=\"memory\"})", "legendFormat": "{{pod}}", "refId": "A" }
          ]
        },

        {
          "id": 8,
          "type": "timeseries",
          "title": "Alloy → Prometheus Remote Write Queue",
          "description": "Queue depth and send failures. Spikes here mean spanmetrics are being dropped — gaps in latency panels.",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 27 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": true },
              "unit": "short"
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "prometheus_remote_storage_samples_pending{job=\"alloy\"}", "legendFormat": "pending samples", "refId": "A" },
            { "datasource": { "uid": "prometheus" }, "expr": "rate(prometheus_remote_storage_samples_failed_total{job=\"alloy\"}[2m])", "legendFormat": "failed/sec", "refId": "B" },
            { "datasource": { "uid": "prometheus" }, "expr": "rate(prometheus_remote_storage_samples_total{job=\"alloy\"}[2m])", "legendFormat": "sent/sec", "refId": "C" }
          ]
        },

        {
          "id": 9,
          "type": "timeseries",
          "title": "Alloy Trace Pipeline — Spans In/Out",
          "description": "OTLP spans received vs exported to Tempo. Drop = Tempo backpressure or queue overflow.",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 27 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 8, "showPoints": "never", "spanNulls": true },
              "unit": "short"
            },
            "overrides": []
          },
          "options": { "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "uid": "prometheus" }, "expr": "rate(otelcol_receiver_accepted_spans_total{job=\"alloy\"}[2m])", "legendFormat": "accepted/sec", "refId": "A" },
            { "datasource": { "uid": "prometheus" }, "expr": "rate(otelcol_exporter_sent_spans_total{job=\"alloy\"}[2m])", "legendFormat": "exported to Tempo/sec", "refId": "B" },
            { "datasource": { "uid": "prometheus" }, "expr": "rate(otelcol_exporter_send_failed_spans_total{job=\"alloy\"}[2m])", "legendFormat": "export failures/sec", "refId": "C" },
            { "datasource": { "uid": "prometheus" }, "expr": "otelcol_exporter_queue_size{job=\"alloy\"}", "legendFormat": "queue depth", "refId": "D" }
          ]
        }
      ]
    }
