# ingress.yaml — Observability stack ingress
# =============================================================================
# Stable URLs (no port-forward needed):
#   Grafana:      http://grafana.local
#   Prometheus:   http://prometheus.local
#   Alertmanager: http://alertmanager.local
#
# One-time setup (add to /etc/hosts):
#   172.18.0.7  grafana.local prometheus.local alertmanager.local
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: observability
  namespace: observability
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
    - host: prometheus.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
    - host: alertmanager.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alertmanager
                port:
                  number: 9093
