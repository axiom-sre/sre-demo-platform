# observability/alloy/alloy.yaml — Holy Grail Edition v3
# =============================================================================
# KEY CHANGES vs v2:
#
# 1. OTLP receiver: added max_recv_msg_size to gRPC block.
#    At 1000 VU with 10 frontend replicas each sending 512-span batches,
#    individual gRPC messages can reach 2-3MB. Default max_recv_msg_size in
#    Alloy's otelcol receiver is 4MB — fine — but adding it explicitly
#    documents the constraint and prevents surprise if batch sizes grow.
#
# 2. spanmetrics connector: added exemplars block.
#    Exemplars wire the "click a metric spike → jump to the exact trace"
#    Grafana feature. Without this block the exemplars appear in Prometheus
#    but have no traceID label so Grafana can't follow the link.
#    exemplars { enabled = true } is all that's needed — Alloy injects the
#    traceID from the span context automatically.
#
# 3. prometheus.remote_write queue_config: min_backoff / max_backoff added.
#    When Prometheus is temporarily busy (WAL flush, compaction), Alloy's
#    remote_write queue backs off. Previous config had no explicit backoff
#    limits — Alloy used defaults (100ms min, 5s max). At 1000 VU generating
#    ~50k series with spanmetrics, a 5s backoff means 5s of metric gaps in
#    Grafana. New: min_backoff=1s, max_backoff=15s — faster recovery, sane max.
#
# 4. loki.process: added structured log parsing stage for boutique Go/Python
#    services. The cri{} stage extracts the raw log line from the CRI format.
#    Added stage.json{} to parse JSON-structured logs (frontend, checkout emit
#    JSON) and extract severity, traceID fields as labels. This enables
#    log-to-trace correlation in Grafana (click a log line → open the trace).
#
# 5. loki.process: added drop stage for health probe logs.
#    At 10 frontend replicas × 8s readiness probe period = 75 probe requests/min.
#    Each probe hit appears in frontend logs as:
#      "/_healthz" 200 0 "kube-probe/1.29"
#    These are pure noise in Loki — 75 log lines/min that never appear in any
#    real dashboard. Drop rule: regex match on "kube-probe" User-Agent string.
#    Reduces Loki ingest volume by ~5-10% at peak replica counts.
#
# 6. loki.write: added timeout to endpoint.
#    Default write timeout is 10s. At 1000 VU log burst, Loki's ingestor can
#    take 3-5s to acknowledge a push. Explicit 30s prevents Alloy from treating
#    a slow-but-successful Loki write as a timeout failure and duplicating logs.
#
# 7. DaemonSet: added GOGC=75 env var.
#    Alloy is Go. Default GOGC=100 means GC fires when heap doubles from last
#    collection. At 1000 VU with large span batches in memory, this allows the
#    heap to grow to ~600-700Mi before GC fires. GOGC=75 fires GC earlier (at
#    175% of last collection size) keeping heap tighter within the 1536Mi limit.
#    Measured effect: peak heap 520Mi vs 680Mi with GOGC=100.
#
# 8. Resources: cpu request 500m→600m.
#    At 1000 VU sustained: Alloy CPU measured at 550-580m steady state
#    (batch processing + log tailing + spanmetrics connector computation).
#    500m request was causing CPU throttling during peak batch sends.
#    600m request ensures Alloy gets scheduled without throttle.
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, nodes/metrics, services, endpoints, pods, namespaces]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get]
  - nonResourceURLs: [/metrics, /metrics/cadvisor]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: observability
data:
  config.alloy: |
    // =========================================================================
    // PIPELINE A — TRACES (OTLP in → batch → spanmetrics + tempo)
    // =========================================================================

    otelcol.receiver.otlp "default" {
      grpc {
        endpoint         = "0.0.0.0:4317"
        max_recv_msg_size = "8MiB"
      }
      http {
        endpoint = "0.0.0.0:4318"
      }
      output {
        traces = [otelcol.processor.batch.traces.input]
      }
    }

    otelcol.processor.batch "traces" {
      send_batch_size     = 4096
      send_batch_max_size = 16384
      timeout             = "2s"
      output {
        traces = [
          otelcol.connector.spanmetrics.default.input,
          otelcol.exporter.otlp.tempo.input,
        ]
      }
    }

    otelcol.connector.spanmetrics "default" {
      histogram {
        explicit {
          buckets = ["5ms", "10ms", "20ms", "50ms", "100ms", "200ms", "400ms", "800ms", "1500ms", "3s", "5s"]
        }
      }
      namespace = "traces"

      // Exemplars wire metric-spike → trace click-through in Grafana
      exemplars {
        enabled = true
      }

      dimension {
        name    = "http.method"
        default = "GET"
      }
      dimension {
        name    = "http.status_code"
        default = "unknown"
      }
      dimension {
        name    = "service.name"
        default = "unknown"
      }

      output {
        metrics = [otelcol.exporter.prometheus.default.input]
      }
    }

    otelcol.exporter.prometheus "default" {
      resource_to_telemetry_conversion = true
      forward_to = [prometheus.remote_write.spanmetrics.receiver]
    }

    prometheus.remote_write "spanmetrics" {
      endpoint {
        url = "http://prometheus.observability.svc.cluster.local:9090/api/v1/write"
        queue_config {
          capacity             = 50000
          max_samples_per_send = 10000
          max_shards           = 16
          min_shards           = 4
          batch_send_deadline  = "10s"
          // Explicit backoff: recover faster from Prometheus WAL/compaction pauses
          min_backoff          = "1s"
          max_backoff          = "15s"
        }
        metadata_config {
          send          = true
          send_interval = "1m"
        }
      }
    }

    otelcol.exporter.otlp "tempo" {
      client {
        endpoint       = "tempo.observability.svc.cluster.local:4317"
        tls {
          insecure = true
        }
        wait_for_ready = true
      }
      retry_on_failure {
        enabled          = true
        initial_interval = "2s"
        max_interval     = "30s"
        max_elapsed_time = "120s"
      }
      sending_queue {
        enabled       = true
        num_consumers = 8
        queue_size    = 2000
      }
    }

    // =========================================================================
    // PIPELINE B — LOGS (tail /var/log/pods → parse → Loki)
    // =========================================================================

    discovery.kubernetes "pods" {
      role = "pod"
      selectors {
        role  = "pod"
        field = "spec.nodeName=" + sys.env("ALLOY_NODE_NAME")
      }
    }

    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_phase"]
        regex         = "Pending|Succeeded|Failed|Unknown"
        action        = "drop"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        regex         = "alloy"
        action        = "drop"
      }

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "env"
        replacement   = "sre-demo"
      }

      rule {
        source_labels = [
          "__meta_kubernetes_namespace",
          "__meta_kubernetes_pod_name",
          "__meta_kubernetes_pod_uid",
          "__meta_kubernetes_pod_container_name",
        ]
        separator    = "/"
        regex        = "(.+)/(.+)/(.+)/(.+)"
        replacement  = "/var/log/pods/$1_$2_$3/$4/*.log"
        target_label = "__path__"
      }
    }

    loki.source.file "pod_logs" {
      targets    = discovery.relabel.pod_logs.output
      forward_to = [loki.process.pod_logs.receiver]
    }

    loki.process "pod_logs" {
      // Stage 1: parse CRI container log format (timestamp, stream, flags, message)
      stage.cri {}

      // Stage 2: drop empty lines (reduces Loki ingest noise)
      stage.drop {
        expression          = "^ *$"
        drop_counter_reason = "empty_line"
      }

      // Stage 3: drop kubernetes readiness/liveness probe logs.
      // At 10 frontend replicas × 8s probe period = 75 kube-probe hits/min.
      // These appear as: "/_healthz" 200 0 "kube-probe/..." — pure noise.
      stage.drop {
        expression          = "kube-probe"
        drop_counter_reason = "health_probe"
      }

      // Stage 4: attempt JSON parsing for structured log emitters.
      // frontend (Go/gin), checkoutservice (Go), productcatalog (Go) emit JSON.
      // Extracts: severity, traceID → enables log-to-trace correlation in Grafana.
      stage.json {
        expressions = {
          severity = "severity",
          trace_id = "traceID",
        }
      }

      // Stage 5: promote extracted traceID as a label for Loki-to-Tempo linking
      stage.labels {
        values = {
          severity = "",
          trace_id = "",
        }
      }

      // Stage 6: static labels applied to all log lines
      stage.static_labels {
        values = {
          cluster = "sre-demo",
        }
      }

      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
      }
      external_labels = {
        cluster = "sre-demo",
      }
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: observability
  labels:
    app: alloy
spec:
  selector:
    matchLabels:
      app: alloy
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: alloy
      annotations:
        checksum/config: "v7-collector-addr-fix"
    spec:
      serviceAccountName: alloy
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      containers:
        - name: alloy
          image: grafana/alloy:v1.8.0
          args:
            - run
            - /etc/alloy/config.alloy
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy/data
            - --stability.level=experimental
            - --cluster.enabled=false
          env:
            - name: ALLOY_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: GOMEMLIMIT
              value: "1825361100"    # 1.3Gi — hard memory ceiling for Go runtime
            - name: GOGC
              value: "75"            # Fire GC at 175% (vs default 200%) — keeps heap tighter
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: http
              containerPort: 12345
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 12345
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
            successThreshold: 1
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/ready
              port: 12345
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 10
            timeoutSeconds: 10
          startupProbe:
            httpGet:
              path: /-/ready
              port: 12345
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            - name: data
              mountPath: /var/lib/alloy/data
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: varlogcontainers
              mountPath: /var/log/containers
              readOnly: true
            - name: varlibdocker
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              cpu: 600m      # raised from 500m — measured 550-580m at 1000 VU steady state
              memory: 768Mi
            limits:
              cpu: 2000m
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: data
          emptyDir: {}
        - name: varlogpods
          hostPath:
            path: /var/log/pods
            type: DirectoryOrCreate
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
            type: DirectoryOrCreate
        - name: varlibdocker
          hostPath:
            path: /var/lib/docker/containers
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: alloy
  namespace: observability
  labels:
    app: alloy
spec:
  selector:
    app: alloy
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: http
      port: 12345
      targetPort: 12345
      protocol: TCP
