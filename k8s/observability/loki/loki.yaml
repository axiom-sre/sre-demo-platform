# observability/loki/loki.yaml — Holy Grail Edition
# =============================================================================
# KEY FIXES vs previous version:
#
# 1. max_query_series field does NOT exist in Loki 3.0.0.
#    The correct field name is: max_query_series_limit (deprecated in 2.x)
#    OR simply omitting it and relying on max_entries_limit_per_query.
#    Including an unknown field in limits_config causes Loki to refuse to
#    start with: "field max_query_series not found in type validation.Limits"
#    Fix: removed max_query_series, kept max_entries_limit_per_query=10000.
#
# 2. PriorityClass: observability-high. Without this, node pressure from
#    boutique HPA scale-out can evict Loki — losing log history for the
#    entire demo session.
#
# 3. chunk_idle_period: 30s — kept. At 1000 VU this causes frequent small
#    flushes which is correct behavior. The alternative (long idle period)
#    holds more data in memory and risks OOM on the 1Gi limit.
#
# 4. chunk_target_size added: 1572864 (1.5MiB). Tells Loki to close chunks
#    when they reach this size rather than waiting for idle timeout.
#    Prevents memory runaway when log burst rate is very high.
#
# 5. ingestion_burst_size_mb: 128→64. 128MB burst was theoretically correct
#    but in practice Loki's ingestor holds the full burst in memory before
#    flushing. On a 1Gi limit, a 128MB burst + other overhead = OOM risk.
#    64MB is the right balance: absorbs thundering-herd startup, fits in RAM.
#
# 6. terminationGracePeriodSeconds: 30. Allows Loki to flush in-memory
#    chunks to the filesystem on graceful shutdown. Without this, pod
#    restarts lose buffered logs silently.
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: observability
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: warn

    common:
      instance_addr: 127.0.0.1
      path_prefix: /tmp/loki
      storage:
        filesystem:
          chunks_directory: /tmp/loki/chunks
          rules_directory: /tmp/loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    ingester:
      chunk_idle_period: 30s
      chunk_retain_period: 1m
      chunk_target_size: 1572864    # 1.5MiB — close chunks by size, not just time
      max_chunk_age: 2h

    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 200

    schema_config:
      configs:
        - from: 2020-10-24
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      reject_old_samples: false
      reject_old_samples_max_age: 336h
      ingestion_rate_mb: 64
      ingestion_burst_size_mb: 64      # reduced from 128 — fits safely in 1Gi limit
      per_stream_rate_limit: 10MB
      per_stream_rate_limit_burst: 20MB
      # max_query_series does NOT exist in Loki 3.0 — removed (was causing startup failure)
      max_entries_limit_per_query: 10000

    analytics:
      reporting_enabled: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: observability
  labels:
    app: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      priorityClassName: observability-high
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsUser: 0
      containers:
        - name: loki
          image: grafana/loki:3.0.0
          args: [-config.file=/etc/loki/loki.yaml]
          ports:
            - containerPort: 3100
            - containerPort: 9096
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/loki
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: loki-config
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: observability
  labels:
    app: loki
spec:
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
    - name: grpc
      port: 9096
      targetPort: 9096
