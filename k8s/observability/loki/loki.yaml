# observability/loki/loki.yaml — Holy Grail Edition v2
# =============================================================================
# FIXES IN THIS VERSION:
#
# FIX 1 — "empty ring" / ingester dropout (CRITICAL — this was breaking Loki)
#   Root cause: ring.kvstore.store=inmemory. In monolithic mode, the ingester
#   registers itself in the ring on startup. With inmemory, the ring state is
#   held in-process. Under ANY memory pressure or GC pause > 2m, the heartbeat
#   goroutine stalls and the instance falls out of the ring. The distributor
#   then sees an empty ring and rejects all pushes with "empty ring" error.
#   You saw this exact sequence:
#     17:59 — "error getting ingester clients: empty ring"
#     19:21 — last heartbeat recorded
#     19:28 — "auto-forgetting instance...forget_period=2m0s"
#   Fix: switch kvstore to memberlist. In monolithic single-pod mode,
#   memberlist runs embedded and is self-healing — it does NOT have the
#   heartbeat-stall failure mode. The ring stays healthy across GC pauses.
#
# FIX 2 — Loki has no PVC (data loss on every pod restart)
#   Previous config used /tmp/loki paths with no PVC → all chunks lost on
#   restart. Added loki-pvc (10Gi, local-path) and moved all paths under
#   /var/loki which is mounted from the PVC. Chunks survive pod restarts.
#   Note: grafana-pvc and tempo-pvc already exist. loki-pvc will be created
#   fresh — kubectl apply will provision it via local-path-provisioner.
#
# FIX 3 — chunk_idle_period 30s → 3m
#   30s caused constant flush churn at idle. With the ring fixed (FIX 1),
#   we no longer need aggressive flushing to avoid ring-stall data loss.
#   3m is the standard value for single-replica monolithic mode.
#
# FIX 4 — ingestion_burst_size_mb: 64 is fine, kept. No change.
#
# UNCHANGED — schema v13, tsdb, filesystem backend, query cache, limits.
# =============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-pvc
  namespace: observability
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: observability
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: warn

    common:
      instance_addr: 127.0.0.1
      path_prefix: /var/loki
      storage:
        filesystem:
          chunks_directory: /var/loki/chunks
          rules_directory:  /var/loki/rules
      replication_factor: 1
      ring:
        kvstore:
          # FIX 1: memberlist instead of inmemory.
          # Memberlist is embedded in monolithic mode — no external consul/etcd
          # needed. The ring stays registered even across long GC pauses because
          # memberlist uses TCP gossip (not a periodic HTTP heartbeat that can
          # stall). This eliminates the "empty ring" failure mode entirely.
          store: memberlist

    memberlist:
      # Single node — join ourselves. Loki discovers its own pod IP via
      # instance_addr above and joins the single-member gossip ring.
      join_members: []
      bind_port: 7946

    ingester:
      chunk_idle_period:  3m       # FIX 3: was 30s — reduced flush churn
      chunk_retain_period: 1m
      chunk_target_size:  1572864  # 1.5MiB — close chunks by size
      max_chunk_age:      2h
      lifecycler:
        ring:
          kvstore:
            store: memberlist
          replication_factor: 1

    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled:     true
            max_size_mb: 200

    schema_config:
      configs:
        - from: 2020-10-24
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      reject_old_samples:         false
      reject_old_samples_max_age: 336h
      ingestion_rate_mb:          64
      ingestion_burst_size_mb:    64
      per_stream_rate_limit:      10MB
      per_stream_rate_limit_burst: 20MB
      max_entries_limit_per_query: 10000

    analytics:
      reporting_enabled: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: observability
  labels:
    app: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      priorityClassName: observability-high
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsUser: 0
        fsGroup: 0
      containers:
        - name: loki
          image: grafana/loki:3.0.0
          args: [-config.file=/etc/loki/loki.yaml]
          ports:
            - name: http
              containerPort: 3100
            - name: grpc
              containerPort: 9096
            - name: memberlist
              containerPort: 7946
          readinessProbe:
            httpGet:
              path:   /ready
              port:   3100
            initialDelaySeconds: 15
            periodSeconds:       10
            failureThreshold:    5
            timeoutSeconds:      5
          livenessProbe:
            httpGet:
              path:   /ready
              port:   3100
            initialDelaySeconds: 45
            periodSeconds:       20
            failureThreshold:    5
            timeoutSeconds:      10
          volumeMounts:
            - name:      config
              mountPath: /etc/loki
            - name:      data
              mountPath: /var/loki
          resources:
            requests:
              cpu:    200m
              memory: 256Mi
            limits:
              cpu:    1000m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: data
          persistentVolumeClaim:
            claimName: loki-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: observability
  labels:
    app: loki
spec:
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
    - name: grpc
      port: 9096
      targetPort: 9096
    - name: memberlist
      port: 7946
      targetPort: 7946
      protocol: TCP
