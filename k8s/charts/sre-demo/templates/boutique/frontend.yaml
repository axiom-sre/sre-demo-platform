{{/* boutique/frontend.yaml — Helm template for the frontend service */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.namespaces.boutique }}
  labels:
    app: frontend
    {{ include "sre-demo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.boutique.frontend.replicas }}
  progressDeadlineSeconds: 300
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: {{ include "sre-demo.boutiqueImage" (dict "service" "frontend" "Values" .Values) }}
          env:
            - name: PORT
              value: "8080"
            - name: DISABLE_PROFILER
              value: "1"
            - name: ENABLE_TRACING
              value: "1"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ include "sre-demo.alloyEndpoint" . }}
            - name: OTEL_SERVICE_NAME
              value: frontend
            - name: COLLECTOR_SERVICE_ADDR
              value: "alloy.{{ .Values.namespaces.observability }}.svc.cluster.local:4317"
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "productcatalogservice.{{ .Values.namespaces.boutique }}.svc.cluster.local:3550"
            - name: CURRENCY_SERVICE_ADDR
              value: "currencyservice.{{ .Values.namespaces.boutique }}.svc.cluster.local:7000"
            - name: CART_SERVICE_ADDR
              value: "cartservice.{{ .Values.namespaces.boutique }}.svc.cluster.local:7070"
            - name: RECOMMENDATION_SERVICE_ADDR
              value: "recommendationservice.{{ .Values.namespaces.boutique }}.svc.cluster.local:8080"
            - name: SHIPPING_SERVICE_ADDR
              value: "shippingservice.{{ .Values.namespaces.boutique }}.svc.cluster.local:50051"
            - name: CHECKOUT_SERVICE_ADDR
              value: "checkoutservice.{{ .Values.namespaces.boutique }}.svc.cluster.local:5050"
            - name: AD_SERVICE_ADDR
              value: "adservice.{{ .Values.namespaces.boutique }}.svc.cluster.local:9555"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: "/_healthz"
              port: 8080
              httpHeaders:
                - name: Cookie
                  value: "shop_session-id=x-readiness-probe"
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: "/_healthz"
              port: 8080
              httpHeaders:
                - name: Cookie
                  value: "shop_session-id=x-liveness-probe"
            initialDelaySeconds: 25
            periodSeconds: 15
            failureThreshold: 5
          resources:
            {{- toYaml .Values.boutique.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Values.namespaces.boutique }}
  labels:
    app: frontend
    {{ include "sre-demo.labels" . | nindent 4 }}
spec:
  selector:
    app: frontend
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend
  namespace: {{ .Values.namespaces.boutique }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: {{ .Values.boutique.frontend.hpa.minReplicas }}
  maxReplicas: {{ .Values.boutique.frontend.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.boutique.frontend.hpa.targetCPUUtilization }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: {{ .Values.namespaces.boutique }}
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: frontend
