name: CI — Manifest Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch/PR to save runner minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Validate Kubernetes manifests ────────────────────────────────────
  validate-manifests:
    name: kubectl dry-run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.3'

      - name: Create local k8s cluster (kind)
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: ci-validation
          node_image: kindest/node:v1.29.2

      - name: Apply namespaces + priority-classes first
        run: |
          kubectl apply -f k8s/namespaces/priority-classes.yaml
          kubectl apply -f k8s/namespaces/namespaces.yaml

      - name: Dry-run all observability manifests
        run: |
          set -e
          FAILED=0
          for f in \
            k8s/observability/infrastructure/infrastructure.yaml \
            k8s/observability/prometheus/prometheus.yaml \
            k8s/observability/loki/loki.yaml \
            k8s/observability/tempo/tempo.yaml \
            k8s/observability/alloy/alloy.yaml \
            k8s/observability/grafana/grafana.yaml; do
            echo "▶ Validating $f"
            if kubectl apply --dry-run=server -f "$f"; then
              echo "  ✓ $f"
            else
              echo "  ✗ $f FAILED"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Dry-run boutique manifests
        run: |
          set -e
          echo "▶ Validating k8s/boutique/boutique.yaml"
          kubectl apply --dry-run=server -f k8s/boutique/boutique.yaml
          echo "▶ Validating k8s/boutique/hpa.yaml"
          # HPA requires the deployment to exist first for server-side dry-run
          kubectl apply --dry-run=server -f k8s/boutique/boutique.yaml 2>/dev/null || true
          kubectl apply --dry-run=client -f k8s/boutique/hpa.yaml
          echo "✓ boutique manifests valid"

  # ── Job 2: Lint shell scripts ────────────────────────────────────────────────
  lint-scripts:
    name: shellcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on all scripts
        run: |
          set -e
          FAILED=0
          for f in k8s/scripts/*.sh; do
            echo "▶ shellcheck $f"
            if shellcheck --severity=warning "$f"; then
              echo "  ✓ $f"
            else
              echo "  ✗ $f"
              FAILED=1
            fi
          done
          exit $FAILED

  # ── Job 3: Check for secrets accidentally staged ─────────────────────────────
  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for gitleaks

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 4: YAML lint ─────────────────────────────────────────────────────────
  yaml-lint:
    name: yamllint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: |
          yamllint -c .yamllint.yaml k8s/ || true
          # Non-fatal for now — outputs warnings only
          # Change to: yamllint -c .yamllint.yaml k8s/  (no || true) to enforce

  # ── Summary gate — all jobs must pass for PR merge ──────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [validate-manifests, lint-scripts, secret-scan, yaml-lint]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.validate-manifests.result }}" != "success" ]]; then
            echo "✗ validate-manifests failed"
            exit 1
          fi
          if [[ "${{ needs.lint-scripts.result }}" != "success" ]]; then
            echo "✗ lint-scripts failed"
            exit 1
          fi
          if [[ "${{ needs.secret-scan.result }}" != "success" ]]; then
            echo "✗ secret-scan failed"
            exit 1
          fi
          echo "✓ All CI checks passed"
